<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INMERSIVE PACMAN</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: "Press Start 2P", monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      margin: auto;
      background: transparent;
      image-rendering: pixelated;
      z-index: 5;
    }

    .hidden-ui {
      display: none;
    }

    .qr-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 30;
      text-align: center;
      color: white;
      font-size: 12px;
    }

    #qrcode {
      background: white;
      padding: 8px;
    }

    .bottom-hud {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8vh;
      display: flex;
      justify-content: space-around;
      align-items: center;
      color: white;
      font-size: 20px;
      z-index: 20;
      pointer-events: none;
    }

    .hud-value {
      margin-top: 6px;
      color: yellow;
    }

    .lives {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .life-icon {
      width: 22px;
      height: 22px;
      background: yellow;
      border-radius: 50%;
      clip-path: polygon(0 0, 100% 50%, 0 100%, 0 65%, 55% 50%, 0 35%);
      transform: rotate(180deg);
    }

    #debugError {
      position: fixed;
      bottom: 90px;
      left: 20px;
      z-index: 9999;
      color: red;
      font-family: monospace;
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <div class="hidden-ui">
    <input id="roomInput" value="ABCD" maxlength="12" />
    <button id="connectRoomBtn">Connect</button>
    <span id="roomStatus">Waiting…</span>
  </div>


  <canvas id="game"></canvas>

  <div class="bottom-hud">
    <div>
      SALA
      <div id="hudRoom" class="hud-value">ABCD</div>
    </div>

    <div>
      VIDAS
      <div id="hudLives" class="lives"></div>
    </div>

    <div>
      PUNTOS
      <div id="hudScore" class="hud-value">0</div>
    </div>

    <div>
      RECORD
      <div id="hudHighScore" class="hud-value">0</div>
    </div>
  </div>

  <div id="debugError"></div>

  <script>
    window.onerror = function(message, source, lineno, colno) {
      document.getElementById("debugError").textContent =
        "JS ERROR:\n" + message + "\nLine: " + lineno + ":" + colno;
    };
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script src="game.js?v=1001"></script>

  <script>
    window.addEventListener("load", () => {
      const ROOM = "ABCD";

      document.getElementById("roomInput").value = ROOM;
      document.getElementById("hudRoom").textContent = ROOM;

      if (typeof connectRoom === "function") {
        connectRoom();
      }

      const controllerURL =
        window.location.origin +
        window.location.pathname.replace("index.html", "") +
        "controller.html?room=" +
        ROOM;

      if (typeof QRCode !== "undefined") {
        new QRCode(document.getElementById("qrcode"), {
          text: controllerURL,
          width: 140,
          height: 140
        });
      }

      console.log("Controller URL:", controllerURL);
    });
  </script>

</body>
</html>
