<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man with Phone Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100vh;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }
    #gameContainer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      border: 2px solid yellow;
      background: black;
    }
    #sidePanel {
      width: 300px;
      padding: 20px;
      background: #222;
      text-align: center;
      border-left: 2px solid yellow;
    }
    #qrcode {
      margin: 20px 0;
    }
    #qrcode img {
      max-width: 100%;
    }
    #roomCode {
      font-size: 24px;
      font-weight: bold;
      color: #ff0;
      margin: 10px 0;
    }
    #playerList {
      margin-top: 20px;
      text-align: left;
    }
    .player-item {
      background: #444;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="560" height="620"></canvas>
  </div>
  
  <div id="sidePanel">
    <h2>Scan to Play!</h2>
    <div id="qrcode"></div>
    <div id="roomCode">Room: -</div>
    <div id="playerList">
      <h3>Players:</h3>
      <div id="players"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
