<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NES Gamepad</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui, Arial, sans-serif;
}

/* Rotate phone message */
.rotate{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  color:#fff;
  font-size:20px;
  z-index:10;
}

/* Hide rotate message in landscape */
@media (orientation: landscape){
  .rotate{ display:none; }
}

/* Fullscreen controller container */
.app{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* NES body */
.nes{
  width:100vw;
  height:100vh;
  background:#d9d9d9;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items:center;
  padding:3vh;
  box-sizing:border-box;
}

/* Panels */
.panel{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* D-Pad */
.dpad{
  position:relative;
  width:40vh;
  height:40vh;
}
.dpad button{
  position:absolute;
  background:#333;
  color:#fff;
  border:none;
  font-size:4vh;
  border-radius:1vh;
}
.up{ top:0; left:13vh; width:14vh; height:10vh; }
.down{ bottom:0; left:13vh; width:14vh; height:10vh; }
.left{ left:0; top:13vh; width:10vh; height:14vh; }
.right{ right:0; top:13vh; width:10vh; height:14vh; }

/* Start / Select */
.mid{
  display:flex;
  gap:4vh;
}
.mid button{
  width:18vh;
  height:6vh;
  border-radius:5vh;
  border:none;
  background:#444;
  color:#fff;
  font-size:2vh;
}

/* A / B */
.ab{
  display:flex;
  gap:6vh;
}
.ab button{
  width:12vh;
  height:12vh;
  border-radius:50%;
  border:none;
  background:#e11d2e;
  color:#fff;
  font-size:4vh;
}
</style>
</head>

<body>

<div class="rotate">Rotate phone to landscape</div>

<div class="app">
  <div class="nes">

    <!-- LEFT -->
    <div class="panel">
      <div class="dpad">
        <button id="up" class="up">▲</button>
        <button id="down" class="down">▼</button>
        <button id="left" class="left">◀</button>
        <button id="right" class="right">▶</button>
      </div>
    </div>

    <!-- MIDDLE -->
    <div class="panel">
      <div class="mid">
        <button id="select">SELECT</button>
        <button id="start">START</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel">
      <div class="ab">
        <button id="b">B</button>
        <button id="a">A</button>
      </div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
  authDomain: "pacman-86c4e.firebaseapp.com",
  databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
  projectId: "pacman-86c4e",
  storageBucket: "pacman-86c4e.firebasestorage.app",
  messagingSenderId: "1044337774275",
  appId: "1:1044337774275:web:362fcd603a473c04e95c76"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ref = db.ref("rooms/ABCD/input");

function send(action){
  ref.set({ action, t: Date.now() });
}

["up","down","left","right","a","b","start","select"].forEach(id=>{
  const el=document.getElementById(id);
  el.onclick=()=>send(id);
  el.addEventListener("touchstart",e=>{
    e.preventDefault();
    send(id);
  },{passive:false});
});

/* Request fullscreen after first tap (Android works, iPhone needs Add to Home Screen) */
document.body.addEventListener("click", ()=>{
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}, { once:true });
</script>

</body>
</html>
