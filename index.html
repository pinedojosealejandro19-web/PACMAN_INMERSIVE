<html lang="en">
<head>

  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: "Press Start 2P", monospace;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      background: transparent;
      image-rendering: pixelated;
    }

    /* ==========================
       HIDDEN ROOM SYSTEM

       The visible QR was removed.
       These hidden elements stay because game.js uses:
       roomInput, connectRoomBtn, roomStatus.
    ========================== */

    .hidden-room-system {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    /* ==========================
       INFO BOARD / HUD
       White outline removed.
    ========================== */

    .hud {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 70px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      padding: 8px 24px;
      background: transparent !important;
      pointer-events: none;
    }

    .hud-box {
      border: none !important;
      border-radius: 0 !important;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      overflow: hidden;
      background: transparent !important;
      box-shadow: none !important;
      outline: none !important;
    }

    .hud-label {
      font-size: 15px;
      line-height: 1;
      margin-bottom: 7px;
      text-transform: uppercase;
      color: white;
    }

    .hud-value {
      font-size: 18px;
      line-height: 1;
      color: white;
    }

    #hudRoom {
      font-size: 16px;
      color: white;
    }

    #hudLives {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;

    /* New life image class from the fixed game.js */
    #hudLives .hud-life-sprite {
      width: 28px !important;
      height: 28px !important;
      object-fit: contain !important;
      image-rendering: pixelated !important;
      display: inline-block !important;
      margin: 0 4px !important;
      background: transparent !important;
      border: 0 !important;
      clip-path: none !important;
      transform: none !important;
      box-shadow: none !important;
      outline: none !important;

    /* Fallback in case an older game.js still creates .life-icon */

      display: inline-block !important;

      image-rendering: pixelated !important;
      border: 0 !important;
      clip-path: none !important;
      transform: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
      margin: 0 4px !important;
      box-shadow: none !important;
      outline: none !important;
    }

    #hudLives .life-icon::before,
    #hudLives .life-icon::after,
    .life-icon::before,
    .life-icon::after {
      display: none !important;
      content: none !important;
      background: none !important;
      border: 0 !important;
      clip-path: none !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* ==========================
       SMALL SCREEN SAFETY
    ========================== */

    @media (max-width: 900px) {
      .hud {
        height: 64px;
        padding: 6px 12px;
        gap: 6px;

       SINGLE-FILE CONTROLLER MODE
    ========================== */
    #controllerScreen {

      display: block;

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const room = String(params.get("room") || "ABCD").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6) || "ABCD";
      const isControllerMode = params.get("controller") === "1";

      window.PACMAN_ROOM = room;
      window.IS_CONTROLLER_MODE = isControllerMode;

      document.body.classList.toggle("controller-mode", isControllerMode);

      const roomInput = document.getElementById("roomInput");
      const hudRoom = document.getElementById("hudRoom");
      if (roomInput) roomInput.value = room;
      if (hudRoom) hudRoom.textContent = room;
      if (!isControllerMode) return;

      const firebaseConfigController = {
        apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
        authDomain: "pacman-86c4e.firebaseapp.com",
        databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
        projectId: "pacman-86c4e",
        storageBucket: "pacman-86c4e.firebasestorage.app",
        messagingSenderId: "1044337774275",
        appId: "1:1044337774275:web:362fcd603a473c04e95c76"
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfigController);
      const dbController = firebase.database();
      const inputRefController = dbController.ref("rooms/" + room + "/input");

      const controllerRoom = document.getElementById("controllerRoom");
      const controllerStatus = document.getElementById("controllerStatus");
      if (controllerRoom) controllerRoom.textContent = "ROOM: " + room;
      if (controllerStatus) controllerStatus.textContent = "Connected to room " + room;

      function sendAction(action) {
        inputRefController.set({
          action: action,
          t: Date.now()
        });

        if (controllerStatus) {
          controllerStatus.textContent = "Sent: " + action.toUpperCase();
        }
      }

      document.querySelectorAll(".pad-btn[data-action]").forEach((button) => {
        const action = button.getAttribute("data-action");

        const press = (event) => {
          event.preventDefault();
          button.classList.add("active");
          sendAction(action);
        };

        const release = (event) => {
          event.preventDefault();
          button.classList.remove("active");
        };

        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", release);
        button.addEventListener("click", (event) => event.preventDefault());
      });
    })();

  <!-- MAIN GAME JS EMBEDDED BELOW -->
  <script>
  if (!window.IS_CONTROLLER_MODE) {
/* ==========================
   FIREBASE CONFIG
========================== */
const firebaseConfig = {
  apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
  authDomain: "pacman-86c4e.firebaseapp.com",
  databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
  projectId: "pacman-86c4e",
  storageBucket: "pacman-86c4e.firebasestorage.app",
  messagingSenderId: "1044337774275",
  appId: "1:1044337774275:web:362fcd603a473c04e95c76"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ==========================
   ROOM & HUD
========================== */
const roomInput = document.getElementById("roomInput");
const connectBtn = document.getElementById("connectRoomBtn");
const roomStatus = document.getElementById("roomStatus");

const hudRoom = document.getElementById("hudRoom");
const hudLives = document.getElementById("hudLives");
const hudScore = document.getElementById("hudScore");
const hudHighScore = document.getElementById("hudHighScore");

let inputRef = null;
let lastInputTimestamp = 0;

let score = 0;
let lives = 3;
let highScore = Number(localStorage.getItem("pacmanHighScore")) || 0;

/* ==========================
   SOUND MANAGER
   Folder required:
   /sound/

   Rename your MP3 files exactly like this:
   sound/dot-eating.mp3
   sound/start.mp3
   sound/end.mp3
   sound/game-over.mp3
   sound/ghost-moving.mp3
   sound/eating-ghost.mp3
   sound/eyes-going-to-cage.mp3

   Main behavior:
   - Dot eating does not stack.
   - Dot eating keeps repeating only while Pac-Man keeps eating.
   - The final dot-eating sound is allowed to finish naturally.
   - Ghost moving uses one simple loop.
   - Eyes-to-cage uses one loop while any eaten ghost is returning.
========================== */
const GameSound = {
  unlocked: false,

  // Increase this if your dot-eating sound is longer.
  // Lower this if it repeats too slowly.
  DOT_CHAIN_GAP_MS: 180,

  sounds: {},
  dotLastEatTime: 0,
  dotActive: false,

  currentLoop: null,

  init() {
    this.sounds = {
      dotEating: this.createAudio("sound/dot-eating.mp3", 0.55, false),
      start: this.createAudio("sound/start.mp3", 0.75, false),
      end: this.createAudio("sound/end.mp3", 0.80, false),
      gameOver: this.createAudio("sound/game-over.mp3", 0.85, false),
      ghostMoving: this.createAudio("sound/ghost-moving.mp3", 0.42, true),
      eatingGhost: this.createAudio("sound/eating-ghost.mp3", 0.85, false),
      eyesToCage: this.createAudio("sound/eyes-going-to-cage.mp3", 0.65, true)
    };

    const dot = this.sounds.dotEating;

    dot.addEventListener("ended", () => {
      const now = performance.now();
      const recentlyAteDot = now - this.dotLastEatTime <= this.DOT_CHAIN_GAP_MS;

      if (recentlyAteDot && !endingStarted && !gameOverActive && !player.isDead) {
        dot.currentTime = 0;
        this.safePlay(dot);
      } else {
        this.dotActive = false;
      }
    });
  },

  createAudio(src, volume = 1, loop = false) {
    const audio = new Audio(src);
    audio.preload = "auto";
    audio.volume = volume;
    audio.loop = loop;

    audio.addEventListener("error", () => {
      console.warn("Sound file could not load:", src);
    });

    audio.load();
    return audio;
  },

  unlock() {
    if (this.unlocked) return;
    this.unlocked = true;

    Object.values(this.sounds).forEach((audio) => {
      const oldVolume = audio.volume;
      audio.volume = 0;

      const playPromise = audio.play();

      if (playPromise && typeof playPromise.then === "function") {
        playPromise
          .then(() => {
            audio.pause();
            audio.currentTime = 0;
            audio.volume = oldVolume;
          })
          .catch(() => {
            audio.volume = oldVolume;
          });
      } else {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = oldVolume;
      }
    });
  },

  safePlay(audio) {
    if (!audio) return;

    const playPromise = audio.play();

    if (playPromise && typeof playPromise.catch === "function") {
      playPromise.catch(() => {
        // Browser probably blocked audio until the game window gets one click/key press.
      });
    }
  },

  playOneShot(name) {
    const audio = this.sounds[name];
    if (!audio) return;

    audio.pause();
    audio.currentTime = 0;
    this.safePlay(audio);
  },

  startLoop(name) {
    if (this.currentLoop === name) return;

    this.stopBackgroundLoops();

    const audio = this.sounds[name];
    if (!audio) return;

    audio.loop = true;
    audio.currentTime = 0;
    this.currentLoop = name;
    this.safePlay(audio);
  },

  stopLoop(name, reset = true) {
    const audio = this.sounds[name];
    if (!audio) return;

    audio.pause();
    if (reset) audio.currentTime = 0;

    if (this.currentLoop === name) {
      this.currentLoop = null;
    }
  },

  stopBackgroundLoops() {
    this.stopLoop("ghostMoving");
    this.stopLoop("eyesToCage");
    this.currentLoop = null;
  },

  stopAllNow() {
    Object.values(this.sounds).forEach((audio) => {
      audio.pause();
      audio.currentTime = 0;
    });

    this.currentLoop = null;
    this.dotActive = false;
  },

  onDotEaten() {
    const dot = this.sounds.dotEating;
    if (!dot) return;

    this.dotLastEatTime = performance.now();

    if (!this.dotActive) {
      this.dotActive = true;
      dot.currentTime = 0;
      this.safePlay(dot);
    }
  },

  playStart() {
    this.stopBackgroundLoops();
    this.playOneShot("start");
  },

  playEnd() {
    // Do not stop dotEating here. The final eating sound should finish naturally.
    this.stopBackgroundLoops();
    this.playOneShot("end");
  },

  playGameOver() {
    this.stopAllNow();
    this.playOneShot("gameOver");
  },

  playEatingGhost() {
    this.playOneShot("eatingGhost");
  },

  updateLoops() {
    if (
      screenState !== "playing" ||
      gameFrozen ||
      readyFreezeTimer > 0 ||
      endingStarted ||
      gameOverActive ||
      player.isDead
    ) {
      this.stopBackgroundLoops();
      return;
    }

    const hasEyesReturning = allGhosts.some((g) => g.isEaten && g.mode === "eyes");

    if (hasEyesReturning) {
      this.startLoop("eyesToCage");
      return;
    }

    const hasActiveGhostMoving = allGhosts.some((g) => {
      if (g.isEaten) return false;
      if (g.cageMode === "waitingInCage") return true;
      if (g.cageMode === "leavingCage") return true;
      return g.isReleased && (g.moving || g.cageMode === "outside");
    });

    if (hasActiveGhostMoving) {
      this.startLoop("ghostMoving");
    } else {
      this.stopBackgroundLoops();
    }
  }
};

function setupGameSoundUnlockers() {
  ["click", "keydown", "touchstart", "pointerdown"].forEach((eventName) => {
    window.addEventListener(eventName, () => GameSound.unlock(), { once: false });
  });
}


// Debug/testing mode. When ON, Pac-Man cannot die from touching ghosts.
let invincibleMode = false;
let invincibleButton = null;

function updateInvincibleButtonLabel() {
  if (!invincibleButton) return;

  invincibleButton.textContent = invincibleMode
    ? "INVINCIBLE: ON"
    : "INVINCIBLE: OFF";

  invincibleButton.style.background = invincibleMode ? "#004d00" : "black";
}

function toggleInvincibleMode() {
  invincibleMode = !invincibleMode;
  updateInvincibleButtonLabel();

  if (roomStatus) {
    roomStatus.textContent = invincibleMode
      ? "Invincible mode ON."
      : "Invincible mode OFF.";
  }
}

/* ==========================
   ENDING SEQUENCE
   When no dots are left:
   freeze 2 seconds → black out 1 second → restart
========================== */
let endingStarted = false;
let gameFrozen = false;

const blackoutOverlay = document.createElement("div");
blackoutOverlay.style.position = "fixed";
blackoutOverlay.style.top = "0";
blackoutOverlay.style.left = "0";
blackoutOverlay.style.width = "100vw";
blackoutOverlay.style.height = "100vh";
blackoutOverlay.style.background = "black";
blackoutOverlay.style.opacity = "0";
blackoutOverlay.style.pointerEvents = "none";
blackoutOverlay.style.zIndex = "999999";
blackoutOverlay.style.transition = "opacity 0.05s linear";
document.body.appendChild(blackoutOverlay);

function hasActiveDots() {
  return dots.some((dot) => dot.active);
}

function startEndingSequence() {
  if (endingStarted) return;

  GameSound.playEnd();

  endingStarted = true;
  gameFrozen = true;

  // Freeze the game for 2 seconds.
  setTimeout(() => {
    blackoutOverlay.style.opacity = "1";

    // Keep the black screen for 1 second, then restart the game.
    setTimeout(() => {
      resetGame();
      blackoutOverlay.style.opacity = "0";
      endingStarted = false;
      gameFrozen = false;
      roomStatus.textContent = "Starting...";
    }, 1000);
  }, 2000);
}


/* ==========================
   READY FREEZE
   Freezes the game for 2 seconds at the start and after respawn.
   The screen still draws, but Pac-Man, ghosts, timers and collisions do not update.
========================== */
const READY_FREEZE_DURATION = 4;
let readyFreezeTimer = 0;
let readyIntroAlreadyPlayed = false;

// SCREEN STATES
// start  = show continue/start background until A is pressed
// playing = normal gameplay
// paused = show pause background until B or A is pressed
let screenState = "start";

// GAME OVER VISUAL STATE
const GAME_OVER_DURATION = 3;
let gameOverTimer = 0;
let gameOverActive = false;
let gameOverLoopSeen = false;
let gameOverResetTimeout = null;

function startReadyFreeze(statusText = "Starting...") {
  if (endingStarted) return;

  readyFreezeTimer = READY_FREEZE_DURATION;

  if (roomStatus) {
    roomStatus.textContent = statusText;
  }
}


function shouldHideGhostsDuringReady() {
  // READY_FREEZE_DURATION is 4 seconds.
  // From 4s → 2s: ghosts are hidden.
  // From 2s → 0s: ghosts are visible but still frozen.
  return readyFreezeTimer > 2;
}


function startInitialReadyFreeze(statusText = "Starting...") {
  if (readyIntroAlreadyPlayed) return;

  readyIntroAlreadyPlayed = true;
  startReadyFreeze(statusText);
}


/* ==========================
   START / CONTINUE / PAUSE SCREEN FLOW
========================== */
function showStartScreen() {
  screenState = "start";
  gameFrozen = true;
  readyFreezeTimer = 0;

  if (roomStatus) {
    roomStatus.textContent = "Press A to start.";
  }

  draw();
}

function startFromStartScreen() {
  if (screenState !== "start") return;

  GameSound.unlock();
  GameSound.playStart();

  screenState = "playing";
  gameFrozen = false;
  startReadyFreeze("Starting...");
}

function showPauseScreen() {
  if (screenState !== "playing") return;
  if (gameOverActive || endingStarted) return;

  screenState = "paused";
  gameFrozen = true;
  readyFreezeTimer = 0;

  if (roomStatus) {
    roomStatus.textContent = "Paused.";
  }

  draw();
}

function resumeFromPauseScreen() {
  if (screenState !== "paused") return;

  screenState = "playing";
  gameFrozen = false;

  if (roomStatus) {
    roomStatus.textContent = "Game resumed.";
  }
}

function togglePauseScreen() {
  if (screenState === "paused") {
    resumeFromPauseScreen();
    return;
  }

  if (screenState === "playing") {
    showPauseScreen();
  }
}

function normalizeButtonAction(action) {
  const value = String(action || "").toLowerCase().trim();

  if (
    value === "a" ||
    value === "buttona" ||
    value === "button-a" ||
    value === "confirm" ||
    value === "continue" ||
    value === "start"
  ) {
    return "a";
  }

  if (
    value === "b" ||
    value === "buttonb" ||
    value === "button-b" ||
    value === "pause" ||
    value === "back"
  ) {
    return "b";
  }

  return value;
}

function handleActionButton(action) {
  GameSound.unlock();

  const button = normalizeButtonAction(action);

  if (button === "a") {
    if (screenState === "start") {
      startFromStartScreen();
      return true;
    }

    if (screenState === "paused") {
      resumeFromPauseScreen();
      return true;
    }

    return false;
  }

  if (button === "b") {
    togglePauseScreen();
    return true;
  }

  return false;
}

   Only ghost-eats count toward this combo.
========================== */
const GHOST_SCORE_VALUES = [200, 400, 600, 800];
const GHOST_SCORE_COMBO_WINDOW = 5;
const GHOST_POINT_POPUP_DURATION = 2;
const GHOST_POINT_POPUP_FALL_DISTANCE = 0;
const GHOST_POINT_POPUP_SCALE = 1.55;
const GHOST_POINT_POPUP_OFFSET_X = 0;
const GHOST_POINT_POPUP_OFFSET_Y = -0.28;

let ghostScoreComboTimer = 0;
let ghostScoreComboIndex = 0;
let ghostPointPopups = [];

function resetGhostScoreCombo() {
  ghostScoreComboTimer = 0;
  ghostScoreComboIndex = 0;
  ghostPointPopups = [];
}

function getNextGhostScoreValue() {
  if (ghostScoreComboTimer <= 0) {
    ghostScoreComboIndex = 0;
  } else {
    ghostScoreComboIndex = Math.min(
      ghostScoreComboIndex + 1,
      GHOST_SCORE_VALUES.length - 1
    );
  }

  ghostScoreComboTimer = GHOST_SCORE_COMBO_WINDOW;
  return GHOST_SCORE_VALUES[ghostScoreComboIndex];
}

function updateGhostScoreCombo(dt) {
  if (ghostScoreComboTimer <= 0) return;

  ghostScoreComboTimer -= dt;

  if (ghostScoreComboTimer <= 0) {
    ghostScoreComboTimer = 0;
    ghostScoreComboIndex = 0;
  }
}

function spawnGhostPointPopup(value, visualX, visualY) {
  ghostPointPopups.push({
    value,
    x: visualX,
    startY: visualY - 0.45,
    age: 0,
    duration: GHOST_POINT_POPUP_DURATION
  });
}

function updateGhostPointPopups(dt) {
  if (ghostPointPopups.length === 0) return;

  ghostPointPopups.forEach((popup) => {
    popup.age += dt;
  });

  ghostPointPopups = ghostPointPopups.filter((popup) => popup.age < popup.duration);
}

    ctx.drawImage(sprite, x, y, size, size * (sprite.naturalHeight / sprite.naturalWidth));
    ctx.restore();
  }
}

/* ==========================
   MAP HELPERS
========================== */
function findTile(marker) {
  for (let r = 0; r < mapData.length; r++) {
    for (let c = 0; c < mapData[r].length; c++) {
      if (mapData[r][c] === marker) return { c, r };
    }
  }
  return null;
}

function findTiles(marker) {
  const found = [];

  for (let r = 0; r < mapData.length; r++) {
    for (let c = 0; c < mapData[r].length; c++) {
      if (mapData[r][c] === marker) found.push({ c, r });
    }
  }

  return found;
}

const GHOST_ONLY_TILE = "6";

const ghostSpawn = findTile("4") || { c: 33, r: 20 };
const pacmanSpawn = findTile("5") || { c: 33, r: 25 };

// If the map has no tile 6 yet, this places a small invisible logical cage
// under the ghost exit so the new behavior can be tested immediately.
// You can later replace these with your own 6s directly in layoutStr.
function installDefaultGhostOnlyCageIfMissing() {
  if (findTiles(GHOST_ONLY_TILE).length > 0) return;

  const defaultOffsets = [
    { dc: -1, dr: 2 },
    { dc: 0, dr: 2 },
    { dc: 1, dr: 2 },
    { dc: -1, dr: 3 },
    { dc: 0, dr: 3 },
    { dc: 1, dr: 3 }
  ];

  defaultOffsets.forEach(({ dc, dr }) => {
    const c = ghostSpawn.c + dc;
    const r = ghostSpawn.r + dr;

    if (r >= 0 && r < PLAYABLE_ROWS && c >= 0 && c < mapData[r].length) {
      mapData[r][c] = GHOST_ONLY_TILE;
    }
  });
}

installDefaultGhostOnlyCageIfMissing();

const ghostOnlyTiles = findTiles(GHOST_ONLY_TILE).sort((a, b) => {
  const distA = Math.abs(a.c - ghostSpawn.c) + Math.abs(a.r - ghostSpawn.r);
  const distB = Math.abs(b.c - ghostSpawn.c) + Math.abs(b.r - ghostSpawn.r);

  if (distA !== distB) return distA - distB;
  if (a.r !== b.r) return a.r - b.r;
  return a.c - b.c;
});

const cageHasGhostOnlyTiles = ghostOnlyTiles.length > 0;

// These values control the special centered exit movement.
// If your visual cage door is shifted, these are the easiest numbers to tweak.
const cageExit = {
  centerVisualX: ghostSpawn.c - 0.5, // centers the ghost between two horizontal exit tiles
  centerVisualY: ghostSpawn.r + 1,
  outsideCol: ghostSpawn.c,
  outsideRow: ghostSpawn.r
};

function getCageLineupColumns() {
  if (!cageHasGhostOnlyTiles) {
    return [ghostSpawn.c - 2, ghostSpawn.c, ghostSpawn.c + 2];
  }

  const allColumns = [...new Set(ghostOnlyTiles.map((tile) => tile.c))].sort((a, b) => a - b);

  if (allColumns.length >= 3) {
    // Use wider spacing inside the cage: left, middle, right.
    const left = allColumns[0];
    const middle = allColumns[Math.floor(allColumns.length / 2)];
    const right = allColumns[allColumns.length - 1];
    return [left, middle, right];
  }

  while (allColumns.length < 3) {
    const fallback = ghostSpawn.c + (allColumns.length - 1) * 2;
    allColumns.push(fallback);
  }

  return allColumns.slice(0, 3);
}

const cageLineupColumns = getCageLineupColumns();

function getCageVisualLayout() {
  // Fine-tuned visual lineup for the three waiting ghosts inside the cage.
  // These positions are not tile-locked on purpose: the goal is a centered,
  // even, arcade-style row, even if the sprites clip across neighboring cells.
  const VISUAL_SPACING = 1.55;
  const VISUAL_CENTER_OFFSET_X = 0;
  // Increase/decrease VISUAL_SPACING above if you want the cage ghosts farther apart or closer together.
  const VISUAL_CENTER_OFFSET_Y = 0.05;
  const BOUNCE_AMOUNT = 0.32;

  if (!cageHasGhostOnlyTiles) {
    const centerX = (ghostSpawn.c - 0.5) + VISUAL_CENTER_OFFSET_X;
    const centerY = (ghostSpawn.r + 2) + VISUAL_CENTER_OFFSET_Y;

    return {
      centerX,
      centerY,
      spacing: VISUAL_SPACING,
      slotXs: [centerX - VISUAL_SPACING, centerX, centerX + VISUAL_SPACING],
      bounceMinY: centerY - BOUNCE_AMOUNT,
      bounceMaxY: centerY + BOUNCE_AMOUNT
    };
  }

  const rows = ghostOnlyTiles.map((tile) => tile.r);
  const minR = Math.min(...rows);
  const maxR = Math.max(...rows);

  // Use the same visual center as the cage door / release center, so the row
  // stays centered in the cage artwork rather than only in the logical tiles.
  const centerX = cageExit.centerVisualX + VISUAL_CENTER_OFFSET_X;
  const centerY = ((minR + maxR) / 2) + VISUAL_CENTER_OFFSET_Y;

  return {
    centerX,
    centerY,
    spacing: VISUAL_SPACING,
    slotXs: [centerX - VISUAL_SPACING, centerX, centerX + VISUAL_SPACING],
    bounceMinY: centerY - BOUNCE_AMOUNT,
    bounceMaxY: centerY + BOUNCE_AMOUNT
  };
}

const cageVisualLayout = getCageVisualLayout();

function applyInsideCageVisualSlot(g, slot) {
  if (!g.startsInsideCage) return;

  const visualX = cageVisualLayout.slotXs[slot] ?? cageVisualLayout.centerX;
  const visualY = cageVisualLayout.centerY;

  // Keep logic on nearby tiles, but draw the ghost at a cleaner visual position.
  g.col = Math.round(visualX);
  g.row = Math.round(visualY);
  g.visualX = visualX;
  g.visualY = visualY;

  g.cageVisualX = visualX;
  g.cageVisualY = visualY;
  g.cageBounceMinY = cageVisualLayout.bounceMinY;
  g.cageBounceMaxY = cageVisualLayout.bounceMaxY;

  g.originalPos = { col: g.col, row: g.row };
  g.originalVisualPos = { x: visualX, y: visualY };
}

function getInsideCageSpawnBySlot(slot, fallback) {
  const c = cageLineupColumns[slot] ?? fallback.c;
  const tilesInColumn = ghostOnlyTiles
    .filter((tile) => tile.c === c)
    .sort((a, b) => a.r - b.r);

  if (tilesInColumn.length === 0) return { c: fallback.c, r: fallback.r };

  // Use the lower/middle area of the cage so the ghosts begin inside, not at the door.
  return tilesInColumn[Math.floor(tilesInColumn.length / 2)];
}

function getCageVerticalBounds(c, row) {
  const rowsInColumn = ghostOnlyTiles
    .filter((tile) => tile.c === c)
    .map((tile) => tile.r)
    .sort((a, b) => a - b);

  if (rowsInColumn.length >= 2) {
    return {
      minY: rowsInColumn[0],
      maxY: rowsInColumn[rowsInColumn.length - 1]
    };
  }

  return {
    minY: row - 0.35,
    maxY: row + 0.35
  };
}

/* ==========================
   ENTITIES
========================== */
const player = {
  col: pacmanSpawn.c,
  row: pacmanSpawn.r,
  visualX: pacmanSpawn.c,
  visualY: pacmanSpawn.r,
  dx: 0,
  dy: 0,
  nextDx: 0,
  nextDy: 0,
  angle: 0,
  moving: false,
  animTimer: 0,
  currentFrame: 1,
  isDead: false,
  deathPhase: 0,
  pauseTimer: 0,
  deathTimer: 0,
  postDeathTimer: 0
};

function createGhost(col, row, nextDx, nextDy, direction, releaseDelay = 0, startsInsideCage = false) {
  const cageBounds = getCageVerticalBounds(col, row);

  return {
    col,
    row,
    visualX: col,
    visualY: row,
    cageVisualX: col,
    cageVisualY: row,
    dx: 0,
    dy: 0,
    nextDx,
    nextDy,
    direction,
    moving: false,
    animTimer: 0,

    releaseDelay,
    releaseTimer: releaseDelay,
    startsInsideCage,
    cageSlot: 1,
    cageMode: startsInsideCage ? "waitingInCage" : "outside",
    cageExitStep: 0,
    cageBounceDir: -1,
    cageBouncePhase: 0,
    cageBounceMinY: cageBounds.minY,
    cageBounceMaxY: cageBounds.maxY,
    isReleased: startsInsideCage ? false : releaseDelay === 0,

    isVulnerable: false,
    vulnerableTimer: 0,
    vulnerableDuration: 8,

    isEaten: false,
    respawnTimer: 0,

    originalPos: { col, row },
    originalVisualPos: { x: col, y: row }
  };
}

// Inside-cage visual order, left to right: blue/teal, pink, orange.
const tealStart = getInsideCageSpawnBySlot(0, { c: ghostSpawn.c - 1, r: ghostSpawn.r + 2 });
const pinkStart = getInsideCageSpawnBySlot(1, { c: ghostSpawn.c, r: ghostSpawn.r + 2 });
const orangeStart = getInsideCageSpawnBySlot(2, { c: ghostSpawn.c + 1, r: ghostSpawn.r + 2 });

// Red starts outside immediately. Pink releases first, then blue/teal, then orange.
const ghost = createGhost(ghostSpawn.c, ghostSpawn.r, 1, 0, "right", 0, false);
const tealGhost = createGhost(tealStart.c, tealStart.r, 0, -1, "up", 16, cageHasGhostOnlyTiles);
const pinkGhost = createGhost(pinkStart.c, pinkStart.r, 0, -1, "up", 8, cageHasGhostOnlyTiles);
const orangeGhost = createGhost(orangeStart.c, orangeStart.r, 0, -1, "up", 24, cageHasGhostOnlyTiles);

// Inside-cage visual order, left to right: blue/teal, pink, orange.
// These positions are centered and evenly spaced visually, even if they overlap tile boundaries.
applyInsideCageVisualSlot(tealGhost, 0);
applyInsideCageVisualSlot(pinkGhost, 1);
applyInsideCageVisualSlot(orangeGhost, 2);

// Initial cage movement direction.
// Teal and orange start moving down.
// Pink starts moving up.
// After that, each ghost keeps bouncing normally.
tealGhost.cageBounceDir = 1;
pinkGhost.cageBounceDir = -1;
orangeGhost.cageBounceDir = 1;

tealGhost.direction = "down";
pinkGhost.direction = "up";
orangeGhost.direction = "down";

// Cage timing offsets.
// Pink is intentionally completely out of timing while waiting inside the cage.
tealGhost.cageBouncePhase = 0;
pinkGhost.cageBouncePhase = Math.PI;
orangeGhost.cageBouncePhase = 0;

// Fixed cage slots used when eaten ghosts return home.
// Red uses the center slot after being eaten; the other ghosts keep their visual order.
ghost.cageSlot = 1;
tealGhost.cageSlot = 0;
pinkGhost.cageSlot = 1;
orangeGhost.cageSlot = 2;

const allGhosts = [ghost, tealGhost, pinkGhost, orangeGhost];

/* ==========================
   DOTS
========================== */
let dots = [];

function initDots() {
  dots = [];

  for (let r = 0; r < mapData.length; r++) {
    for (let c = 0; c < mapData[r].length; c++) {
      const tile = mapData[r][c];

      if (tile === "0") {
        dots.push({ c, r, active: true, isBig: false });
      } else if (tile === "3") {
        dots.push({ c, r, active: true, isBig: true });
      }
    }
  }
}

function eatDotAt(col, row) {
  const dot = dots.find((d) => d.active && d.c === col && d.r === row);
  if (!dot) return;

  dot.active = false;
  GameSound.onDotEaten();

  if (dot.isBig) {
    updateScore(50);
    activateGhostVulnerable();
  } else {
    updateScore(10);
  }

  if (!hasActiveDots()) {
    startEndingSequence();
  }
}

initDots();


/* ==========================
   SCREEN WAKE LOCK
   Keeps the projection computer screen from sleeping while the game is open.
   Works best on HTTPS / GitHub Pages / Chrome / Edge.
========================== */
let screenWakeLock = null;

async function requestScreenWakeLock() {
  if (!("wakeLock" in navigator)) {
    return;
  }

  try {
    screenWakeLock = await navigator.wakeLock.request("screen");

    screenWakeLock.addEventListener("release", () => {
      screenWakeLock = null;
    });
  } catch (err) {
    // Some browsers require a user gesture first.
    // The listeners in setupScreenWakeLock() will retry.
  }
}

function setupScreenWakeLock() {
  requestScreenWakeLock();

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      requestScreenWakeLock();
    }
  });

  ["click", "keydown", "touchstart", "pointerdown"].forEach((eventName) => {
    window.addEventListener(eventName, requestScreenWakeLock);
  });
}

/* ==========================
   ROOM CONNECTION
========================== */
function setQueuedDirection(action) {
  if (screenState !== "playing") return;

  if (action === "up") {
    player.nextDx = 0;
    player.nextDy = -1;
  } else if (action === "down") {
    player.nextDx = 0;
    player.nextDy = 1;
  } else if (action === "left") {
    player.nextDx = -1;
    player.nextDy = 0;
  } else if (action === "right") {
    player.nextDx = 1;
    player.nextDy = 0;
  }
}

function connectRoom() {
  const room = (roomInput.value.trim() || "ABCD").toUpperCase();

  if (inputRef) inputRef.off();

  inputRef = db.ref("rooms/" + room + "/input");

  roomStatus.textContent = "Connected: " + room;
  hudRoom.textContent = room;

  inputRef.on("value", (snap) => {
    const data = snap.val();

    if (!data || !data.action) return;
    if (data.t && data.t === lastInputTimestamp) return;

    if (data.t) lastInputTimestamp = data.t;

    const action = normalizeButtonAction(data.action);

    if (handleActionButton(action)) return;
    if (screenState !== "playing") return;

    setQueuedDirection(action);
  });
}

connectBtn.addEventListener("click", connectRoom);

// Auto-connect because the JOIN button is hidden in this single-file version.
// This keeps the game listening to the same room used by the background QR.
if (window.PACMAN_ROOM && roomInput) {
  roomInput.value = String(window.PACMAN_ROOM).toUpperCase();
}
connectRoom();

/* ==========================
   INPUT
========================== */
window.addEventListener("keydown", (e) => {
  GameSound.unlock();

  const key = e.key.toLowerCase();

  // Keyboard A syncs with gamepad A on START / PAUSE screens.
  if (key === "a" && screenState !== "playing") {
    if (handleActionButton("a")) return;
  }

  // Keyboard B syncs with gamepad B for PAUSE / RESUME.
  if (key === "b") {
    if (handleActionButton("b")) return;
  }

  if (screenState !== "playing") return;

  if (key === "w" || key === "arrowup") setQueuedDirection("up");
  else if (key === "s" || key === "arrowdown") setQueuedDirection("down");
  else if (key === "a" || key === "arrowleft") setQueuedDirection("left");
  else if (key === "d" || key === "arrowright") setQueuedDirection("right");
  else if (key === "i") toggleInvincibleMode();
});

/* ==========================
   WALKABLE + PORTALS
========================== */
const portalCoords = {};

for (let r = 0; r < mapData.length; r++) {
  for (let c = 0; c < mapData[r].length; c++) {
    const char = mapData[r][c];

    if (/[A-D]/.test(char)) {
      if (!portalCoords[char]) portalCoords[char] = [];
      portalCoords[char].push({ c, r });
    }
  }
}

function isWalkable(c, r, isPlayer = false) {
  if (r < 0 || r >= PLAYABLE_ROWS || c < 0 || c >= mapData[r].length) return false;

  const tile = mapData[r][c];

  if (tile === GHOST_ONLY_TILE) {
    return !isPlayer;
  }

  return (
    tile === "0" ||
    tile === "2" ||
    tile === "3" ||
    tile === "4" ||
    tile === "5" ||
    /[A-D]/.test(tile)
  );
}

function isWalkableForPlayer(c, r) {
  return isWalkable(c, r, true);
}

function isWalkableForGhost(c, r) {
  return isWalkable(c, r, false);
}


function canEntityWalkTo(ent, c, r, isPlayer) {
  if (isPlayer) return isWalkableForPlayer(c, r);
  return isWalkableForGhost(c, r);
}

function updateEntityDirection(ent, isPlayer) {
  if (isPlayer) {
    if (ent.dx === 1) ent.angle = 0;
    else if (ent.dx === -1) ent.angle = Math.PI;
    else if (ent.dy === 1) ent.angle = Math.PI / 2;
    else if (ent.dy === -1) ent.angle = -Math.PI / 2;
  } else {
    if (ent.dx === 1) ent.direction = "right";
    else if (ent.dx === -1) ent.direction = "left";
    else if (ent.dy === 1) ent.direction = "down";
    else if (ent.dy === -1) ent.direction = "up";
  }
}

function teleport(ent, targetTile, c, r) {
  const pair = portalCoords[targetTile]?.find((p) => p.c !== c || p.r !== r);
  if (!pair) return;

  ent.col = pair.c;
  ent.row = pair.r;
  ent.visualX = pair.c;
  ent.visualY = pair.r;

  if (targetTile === "C" || targetTile === "D") {
    if (ent.dy === -1) {
      ent.dx = 1;
      ent.dy = 0;
    } else if (ent.dx === -1) {
      ent.dx = 0;
      ent.dy = 1;
    }
  } else {
    if (ent.dy === -1) {
      ent.dx = -1;
      ent.dy = 0;
    } else if (ent.dx === 1) {
      ent.dx = 0;
      ent.dy = 1;
    }
  }

  ent.nextDx = ent.dx;
  ent.nextDy = ent.dy;

  updateEntityDirection(ent, ent === player);

  ent.moving = true;

  if (ent === player) eatDotAt(ent.col, ent.row);
}

/* ==========================
   GHOST STATE
========================== */
function activateGhostVulnerable() {
  allGhosts.forEach((g) => {
    if (g.isEaten) return;

    g.isVulnerable = true;
    g.vulnerableTimer = g.vulnerableDuration;
    g.animTimer = 0;
  });
}

function eatGhost(g) {
  GameSound.playEatingGhost();

  const ghostScoreValue = getNextGhostScoreValue();
  updateScore(ghostScoreValue);
  spawnGhostPointPopup(ghostScoreValue, g.visualX, g.visualY);

  // Snap the eyes to the closest valid path tile first.
  // This prevents the eyes from freezing if the ghost was eaten between two cells.
  const nearestTile = getNearestGhostWalkableTile(g.visualX, g.visualY, g.col, g.row);

  g.col = nearestTile.c;
  g.row = nearestTile.r;
  g.visualX = nearestTile.c;
  g.visualY = nearestTile.r;

  g.isVulnerable = false;
  g.vulnerableTimer = 0;

  // EYES / RETURN-TO-CAGE MODE
  g.mode = "eyes";
  g.isEaten = true;
  g.isReleased = true;
  g.cageMode = "returningToCage";
  g.cageExitStep = 0;
  g.releaseTimer = 0;
  g.respawnTimer = 0;

  g.dx = 0;
  g.dy = 0;
  g.nextDx = 0;
  g.nextDy = 0;
  g.moving = false;

  startEyesReturnPath(g);
}

function respawnGhost(g, nextDx, nextDy, direction, resetRelease = false) {
  g.col = g.originalPos.col;
  g.row = g.originalPos.row;

  if (g.startsInsideCage && g.originalVisualPos) {
    g.visualX = g.originalVisualPos.x;
    g.visualY = g.originalVisualPos.y;
    g.cageVisualX = g.originalVisualPos.x;
    g.cageVisualY = g.originalVisualPos.y;
  } else {
    g.visualX = g.originalPos.col;
    g.visualY = g.originalPos.row;
  }

  g.dx = 0;
  g.dy = 0;
  g.nextDx = nextDx;
  g.nextDy = nextDy;
  g.direction = direction;

  g.moving = false;
  g.animTimer = 0;
  g.cageExitStep = 0;
  g.cageBounceDir = -1;

  if (g.startsInsideCage) {
    g.cageBounceMinY = cageVisualLayout.bounceMinY;
    g.cageBounceMaxY = cageVisualLayout.bounceMaxY;
  } else {
    const cageBounds = getCageVerticalBounds(g.col, g.row);
    g.cageBounceMinY = cageBounds.minY;
    g.cageBounceMaxY = cageBounds.maxY;
  }

  if (resetRelease) {
    g.releaseTimer = g.releaseDelay;

    if (g.startsInsideCage) {
      g.isReleased = false;
      g.cageMode = "waitingInCage";
    } else {
      g.isReleased = g.releaseDelay === 0;
      g.cageMode = g.isReleased ? "outside" : "waiting";
    }
  } else {
    g.releaseTimer = 0;

    if (g.startsInsideCage) {
      g.isReleased = false;
      g.cageMode = "leavingCage";
    } else {
      g.isReleased = true;
      g.cageMode = "outside";
    }
  }

  g.isVulnerable = false;
  g.vulnerableTimer = 0;

  g.isEaten = false;
  g.respawnTimer = 0;
}


function respawnGhostInsideCageAfterEyes(g) {
  let nextDx = 1;
  let nextDy = 0;
  let direction = "right";

  if (g === orangeGhost) {
    nextDx = -1;
    nextDy = 0;
    direction = "left";
  } else if (g === tealGhost) {
    nextDx = 1;
    nextDy = 0;
    direction = "right";
  } else if (g === pinkGhost) {
    nextDx = 0;
    nextDy = 1;
    direction = "down";
  }

  // Put the ghost back into its inside-cage visual slot if it belongs there.
  if (g.startsInsideCage) {
    g.col = g.originalPos.col;
    g.row = g.originalPos.row;
    g.visualX = g.originalVisualPos.x;
    g.visualY = g.originalVisualPos.y;
    g.cageVisualX = g.originalVisualPos.x;
    g.cageVisualY = g.originalVisualPos.y;
    g.cageMode = "waitingInCage";
    g.releaseTimer = 4;
    g.isReleased = false;
  } else {
    // Red starts outside, but after being eaten it should also wait briefly before returning.
    g.col = ghostSpawn.c;
    g.row = ghostSpawn.r;
    g.visualX = ghostSpawn.c;
    g.visualY = ghostSpawn.r;
    g.cageMode = "waitingInCage";
    g.releaseTimer = 4;
    g.isReleased = false;
  }

  g.mode = "normal";
  g.isEaten = false;
  g.isVulnerable = false;
  g.vulnerableTimer = 0;
  g.respawnTimer = 0;

  g.dx = 0;
  g.dy = 0;
  g.nextDx = nextDx;
  g.nextDy = nextDy;
  g.direction = direction;
  g.moving = false;
  g.animTimer = 0;
}

function updateGhostRelease(g, dt) {
  if (g.isReleased || g.cageMode === "leavingCage") return;
  if (g.isEaten) return;

  g.releaseTimer -= dt;

  if (g.releaseTimer <= 0) {
    g.releaseTimer = 0;

    if (g.cageMode === "waitingInCage" || g.startsInsideCage) {
      g.cageMode = "leavingCage";
      g.cageExitStep = 0;
      g.dx = 0;
      g.dy = 0;
      g.nextDx = 0;
      g.nextDy = -1;
      g.direction = "up";
      g.moving = false;
    } else {
      g.isReleased = true;
      g.cageMode = "outside";
    }
  }
}

function updateGhostCageWaiting(g, dt) {
  if (g.cageMode !== "waitingInCage") return;
  if (g.isEaten) return;

  // Keep each ghost in its visual horizontal slot.
  g.visualX = g.cageVisualX;

  // Keep moving up/down while waiting in the cage.
  // This continues even if this is the last ghost remaining inside.
  const speed = GHOST_CAGE_BOUNCE_SPEED;
  const dir = g.cageBounceDir || 1;

  g.visualY += dir * speed * dt;

  if (g.visualY >= g.cageBounceMaxY) {
    g.visualY = g.cageBounceMaxY;
    g.cageBounceDir = -1;
  } else if (g.visualY <= g.cageBounceMinY) {
    g.visualY = g.cageBounceMinY;
    g.cageBounceDir = 1;
  }

  // Change the displayed sprite based on actual vertical movement.
  g.direction = g.cageBounceDir > 0 ? "down" : "up";
  g.row = Math.round(g.visualY);

  // Keep sprite animation alive while waiting.
  g.moving = true;
  g.animTimer += dt * 15;
}

function moveVisualToward(g, targetX, targetY, speed, dt) {
  const diffX = targetX - g.visualX;
  const diffY = targetY - g.visualY;
  const distance = Math.hypot(diffX, diffY);

  if (distance < 0.03) {
    g.visualX = targetX;
    g.visualY = targetY;
    return true;
  }

  const step = Math.min(distance, speed * dt);
  g.visualX += (diffX / distance) * step;
  g.visualY += (diffY / distance) * step;

  return false;
}

function updateGhostCageExit(g, dt) {
  if (g.cageMode !== "leavingCage") return;

  const exitSpeed = SPEED_CELLS_PER_SECOND * 0.7;
  g.animTimer += dt * 15;

  if (g.cageExitStep === 0) {
    const reached = moveVisualToward(g, cageExit.centerVisualX, g.visualY, exitSpeed, dt);
    if (reached) g.cageExitStep = 1;
    return;
  }

  if (g.cageExitStep === 1) {
    const reached = moveVisualToward(g, cageExit.centerVisualX, cageExit.centerVisualY, exitSpeed, dt);
    if (reached) g.cageExitStep = 2;
    return;
  }

  if (g.cageExitStep === 2) {
    const reached = moveVisualToward(g, cageExit.outsideCol, cageExit.outsideRow, exitSpeed, dt);

    if (reached) {
      g.col = cageExit.outsideCol;
      g.row = cageExit.outsideRow;
      g.visualX = g.col;
      g.visualY = g.row;
      g.dx = 0;
      g.dy = 0;
      g.nextDx = 0;
      g.nextDy = -1;
      g.direction = "up";
      g.moving = false;
      g.isReleased = true;
      g.cageMode = "outside";
      g.cageExitStep = 0;
    }
  }
}

/* ==========================
   EATEN GHOST / EYES RETURN PATH
========================== */
function getPortalDestination(c, r) {
  const tile = mapData[r]?.[c];
  if (!/[A-D]/.test(tile)) return null;

  const pair = portalCoords[tile]?.find((p) => p.c !== c || p.r !== r);
  return pair || null;
}

function getGhostPathNeighbors(c, r) {
  const directions = [
    { dx: 0, dy: -1 },
    { dx: -1, dy: 0 },
    { dx: 1, dy: 0 },
    { dx: 0, dy: 1 }
  ];

  const neighbors = [];

  directions.forEach((dir) => {
    let nc = c + dir.dx;
    let nr = r + dir.dy;

    if (!isWalkableForGhost(nc, nr)) return;

    const portalDestination = getPortalDestination(nc, nr);
    if (portalDestination) {
      nc = portalDestination.c;
      nr = portalDestination.r;
    }

    neighbors.push({
      c: nc,
      r: nr,
      firstDx: dir.dx,
      firstDy: dir.dy
    });
  });

  return neighbors;
}

function getShortestDirectionToTile(g, targetCol, targetRow) {
  const startCol = g.col;
  const startRow = g.row;

  if (startCol === targetCol && startRow === targetRow) return null;

  const queue = [{
    c: startCol,
    r: startRow,
    firstDx: 0,
    firstDy: 0
  }];

  const visited = new Set([`${startCol},${startRow}`]);

  while (queue.length > 0) {
    const current = queue.shift();
    const neighbors = getGhostPathNeighbors(current.c, current.r);

    for (const neighbor of neighbors) {
      const key = `${neighbor.c},${neighbor.r}`;
      if (visited.has(key)) continue;

      const firstDx = current.firstDx || neighbor.firstDx;
      const firstDy = current.firstDy || neighbor.firstDy;

      if (neighbor.c === targetCol && neighbor.r === targetRow) {
        return { dx: firstDx, dy: firstDy };
      }

      visited.add(key);
      queue.push({
        c: neighbor.c,
        r: neighbor.r,
        firstDx,
        firstDy
      });
    }
  }

  // Fallback if no full path is found.
  return chooseClosestToTarget(g, targetCol, targetRow);
}

function placeGhostInsideCage(g) {
  const slot = g.cageSlot ?? 1;
  const visualX = cageVisualLayout.slotXs[slot] ?? cageVisualLayout.centerX;
  const visualY = cageVisualLayout.centerY;

  g.col = Math.round(visualX);
  g.row = Math.round(visualY);
  g.visualX = visualX;
  g.visualY = visualY;

  g.cageVisualX = visualX;
  g.cageVisualY = visualY;
  g.cageBounceMinY = cageVisualLayout.bounceMinY;
  g.cageBounceMaxY = cageVisualLayout.bounceMaxY;
}

function reviveGhostInCage(g) {
  placeGhostInsideCage(g);

  g.isEaten = false;
  g.isVulnerable = false;
  g.vulnerableTimer = 0;

  g.isReleased = false;
  g.releaseTimer = EATEN_GHOST_CAGE_WAIT;
  g.cageMode = "waitingInCage";
  g.cageExitStep = 0;
  g.cageBounceDir = -1;

  g.dx = 0;
  g.dy = 0;
  g.nextDx = 0;
  g.nextDy = 0;
  g.direction = "up";
  g.moving = false;
  g.animTimer = 0;
}

function updateEatenGhostReturn(g) {
  // Eaten eyes are now moved directly inside updateEntity()
  // using a full tile path. This function stays as a safe no-op
  // so older update-loop calls do not fight the new movement.
  return;
}

/* ==========================
   AI HELPERS
========================== */
function isGhostAtTileCenter(g) {
  return (
    Math.abs(g.visualX - g.col) < 0.05 &&
    Math.abs(g.visualY - g.row) < 0.05
  );
}

function getValidGhostDirections(g) {
  const directions = [
    { dx: 0, dy: -1 },
    { dx: 0, dy: 1 },
    { dx: -1, dy: 0 },
    { dx: 1, dy: 0 }
  ];

  return directions.filter((dir) => isWalkableForGhost(g.col + dir.dx, g.row + dir.dy));
}

function isIntersection(g) {
  const validDirections = getValidGhostDirections(g);

  if (validDirections.length >= 3) return true;

  const canTurnVertical = validDirections.some((d) => d.dy !== 0);
  const canTurnHorizontal = validDirections.some((d) => d.dx !== 0);

  return canTurnVertical && canTurnHorizontal;
}

function chooseRandomNoReverse(g) {
  const valid = getValidGhostDirections(g);
  if (valid.length === 0) return null;

  const opposite = { dx: -g.dx, dy: -g.dy };

  let options = valid.filter((d) => !(d.dx === opposite.dx && d.dy === opposite.dy));
  if (options.length === 0) options = valid;

  return options[Math.floor(Math.random() * options.length)];
}

function chooseClosestToTarget(g, targetCol, targetRow) {
  const valid = getValidGhostDirections(g);
  if (valid.length === 0) return null;

  const opposite = { dx: -g.dx, dy: -g.dy };

  let options = valid.filter((d) => !(d.dx === opposite.dx && d.dy === opposite.dy));
  if (options.length === 0) options = valid;

  options.sort((a, b) => {
    const distA = Math.abs((g.col + a.dx) - targetCol) + Math.abs((g.row + a.dy) - targetRow);
    const distB = Math.abs((g.col + b.dx) - targetCol) + Math.abs((g.row + b.dy) - targetRow);
    return distA - distB;
  });

  return options[0];
}

function chooseFartherFromTarget(g, targetCol, targetRow) {
  const valid = getValidGhostDirections(g);
  if (valid.length === 0) return null;

  const opposite = { dx: -g.dx, dy: -g.dy };

  let options = valid.filter((d) => !(d.dx === opposite.dx && d.dy === opposite.dy));
  if (options.length === 0) options = valid;

  options.sort((a, b) => {
    const distA = Math.abs((g.col + a.dx) - targetCol) + Math.abs((g.row + a.dy) - targetRow);
    const distB = Math.abs((g.col + b.dx) - targetCol) + Math.abs((g.row + b.dy) - targetRow);
    return distB - distA;
  });

  return options[0];
}


/* ==========================
   EYES RETURN AI
   Eaten ghosts return to the cage as eyes.
========================== */

function chooseShortestPathToTarget(g, targetCol, targetRow) {
  const startC = g.col;
  const startR = g.row;

  const target = { c: targetCol, r: targetRow };
  const key = (c, r) => `${c},${r}`;

  const queue = [{ c: startC, r: startR }];
  const visited = new Set([key(startC, startR)]);
  const parent = new Map();

  const directions = [
    { dx: 0, dy: -1 },
    { dx: 0, dy: 1 },
    { dx: -1, dy: 0 },
    { dx: 1, dy: 0 }
  ];

  let foundKey = null;

  while (queue.length > 0) {
    const current = queue.shift();
    const currentKey = key(current.c, current.r);

    if (current.c === target.c && current.r === target.r) {
      foundKey = currentKey;
      break;
    }

    for (const dir of directions) {
      const nc = current.c + dir.dx;
      const nr = current.r + dir.dy;
      const nk = key(nc, nr);

      if (visited.has(nk)) continue;

      // Eyes use ghost movement rules, so they can move through ghost-only cage tiles too.
      if (!isWalkableForGhost(nc, nr)) continue;

      visited.add(nk);
      parent.set(nk, {
        prev: currentKey,
        dir
      });
      queue.push({ c: nc, r: nr });
    }
  }

  if (!foundKey) {
    // Fallback: if a path is not found, use the old closest-target logic.
    return chooseClosestToTarget(g, targetCol, targetRow);
  }

  let stepKey = foundKey;
  let stepData = parent.get(stepKey);

  // Walk backward until we find the first step after the start.
  while (stepData && stepData.prev !== key(startC, startR)) {
    stepKey = stepData.prev;
    stepData = parent.get(stepKey);
  }

  return stepData ? stepData.dir : null;
}

function chooseEyesReturnDirection(g) {
  if (!g.isEaten) return;
  if (g.mode !== "eyes") return;
  if (!isGhostAtTileCenter(g)) return;

  // Eyes return using a real shortest route through the playable map.
  const choice = chooseShortestPathToTarget(g, ghostSpawn.c, ghostSpawn.r);

  if (!choice) return;

  g.nextDx = choice.dx;
  g.nextDy = choice.dy;
}

/* ==========================
   AI PER GHOST
========================== */
function chooseRedGhostAIDirection() {
  const g = ghost;

  if (g.isEaten || !g.isReleased || !isGhostAtTileCenter(g)) return;

  const valid = getValidGhostDirections(g);

  if (valid.length === 0) {
    g.nextDx = 0;
    g.nextDy = 0;
    g.moving = false;
    return;
  }

  if (!g.moving || (g.dx === 0 && g.dy === 0) || isIntersection(g)) {
    const choice = chooseRandomNoReverse(g);
    if (!choice) return;

    g.nextDx = choice.dx;
    g.nextDy = choice.dy;
  }
}

function chooseOrangeGhostAIDirection() {
  const g = orangeGhost;

  if (g.isEaten || !g.isReleased || !isGhostAtTileCenter(g)) return;

  let choice;

  if (!g.moving || (g.dx === 0 && g.dy === 0) || isIntersection(g)) {
    if (Math.random() < 0.65) {
      choice = chooseClosestToTarget(g, player.col, player.row);
    } else {
      choice = chooseRandomNoReverse(g);
    }

    if (!choice) return;

    g.nextDx = choice.dx;
    g.nextDy = choice.dy;
  }
}

function chooseTealGhostAIDirection() {
  const g = tealGhost;

  if (g.isEaten || !g.isReleased || !isGhostAtTileCenter(g)) return;

  let choice;

  if (!g.moving || (g.dx === 0 && g.dy === 0) || isIntersection(g)) {
    if (Math.random() < 0.5) {
      choice = chooseClosestToTarget(g, player.col, player.row);
    } else {
      choice = chooseFartherFromTarget(g, player.col, player.row);
    }

    if (!choice) return;

    g.nextDx = choice.dx;
    g.nextDy = choice.dy;
  }
}

function choosePinkGhostAIDirection() {
  const g = pinkGhost;

  if (g.isEaten || !g.isReleased || !isGhostAtTileCenter(g)) return;

  let choice;

  if (!g.moving || (g.dx === 0 && g.dy === 0) || isIntersection(g)) {
    const targetCol = player.col + player.dx * 4;
    const targetRow = player.row + player.dy * 4;

    choice = chooseClosestToTarget(g, targetCol, targetRow);
    if (!choice) return;

    g.nextDx = choice.dx;
    g.nextDy = choice.dy;
  }
}

/* ==========================
   COLLISIONS
========================== */
function checkGhostCollision(g) {
  if (player.isDead) return;
  if (g.isEaten && g.mode === "eyes") {
    drawEatenGhostEyes(g);
    return;
  }

  if (!g.isReleased) return;
  if (g.isEaten) return;

  const dist = Math.hypot(
    player.visualX - g.visualX,
    player.visualY - g.visualY
  );

  if (dist < 0.6) {
    if (g.isVulnerable) {
      eatGhost(g);
      return;
    }

    if (invincibleMode) {
      return;
    }

    player.isDead = true;
    GameSound.stopBackgroundLoops();

    player.moving = false;
    allGhosts.forEach((ghostItem) => {
      ghostItem.moving = false;
    });

    player.deathPhase = 0;
    player.pauseTimer = 0;
    player.deathTimer = 0;
    player.postDeathTimer = 0;
  }
}

function checkCollisions() {
  allGhosts.forEach((g) => checkGhostCollision(g));
}


/* ==========================
   DIRECT EYES RETURN MOVEMENT
   This bypasses normal ghost roaming so eaten eyes cannot get stuck.
========================== */
function getNearestGhostWalkableTile(visualX, visualY, fallbackCol, fallbackRow) {
  const baseC = Math.round(visualX);
  const baseR = Math.round(visualY);

  let best = null;
  let bestDist = Infinity;

  for (let radius = 0; radius <= 3; radius++) {
    for (let r = baseR - radius; r <= baseR + radius; r++) {
      for (let c = baseC - radius; c <= baseC + radius; c++) {
        if (!isWalkableForGhost(c, r)) continue;

        const dist = Math.hypot(c - visualX, r - visualY);
        if (dist < bestDist) {
          bestDist = dist;
          best = { c, r };
        }
      }
    }

    if (best) return best;
  }

  if (isWalkableForGhost(fallbackCol, fallbackRow)) {
    return { c: fallbackCol, r: fallbackRow };
  }

  return { c: ghostSpawn.c, r: ghostSpawn.r };
}

function getEyesReturnTargets() {
  const targets = [];

  // Primary target: the ghost base marker.
  targets.push({ c: ghostSpawn.c, r: ghostSpawn.r });

  // Secondary target: the visual exit/outside tile.
  targets.push({ c: cageExit.outsideCol, r: cageExit.outsideRow });

  // Extra targets around the cage marker, in case one exact tile is blocked by a layout change.
  const around = [
    { c: ghostSpawn.c, r: ghostSpawn.r - 1 },
    { c: ghostSpawn.c, r: ghostSpawn.r + 1 },
    { c: ghostSpawn.c - 1, r: ghostSpawn.r },
    { c: ghostSpawn.c + 1, r: ghostSpawn.r }
  ];

  targets.push(...around);

  const seen = new Set();
  return targets.filter((target) => {
    const key = `${target.c},${target.r}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return isWalkableForGhost(target.c, target.r);
  });
}

function getAdjacentGhostPathTiles(c, r) {
  const directions = [
    { dx: 0, dy: -1 },
    { dx: -1, dy: 0 },
    { dx: 1, dy: 0 },
    { dx: 0, dy: 1 }
  ];

  const result = [];

  directions.forEach((dir) => {
    const nc = c + dir.dx;
    const nr = r + dir.dy;

    if (isWalkableForGhost(nc, nr)) {
      result.push({ c: nc, r: nr });
    }
  });

  return result;
}

function getShortestTilePath(startC, startR, targetC, targetR) {
  const key = (c, r) => `${c},${r}`;
  const startKey = key(startC, startR);
  const targetKey = key(targetC, targetR);

  if (startKey === targetKey) return [{ c: startC, r: startR }];

  const queue = [{ c: startC, r: startR }];
  const visited = new Set([startKey]);
  const parent = new Map();

  while (queue.length > 0) {
    const current = queue.shift();

    for (const next of getAdjacentGhostPathTiles(current.c, current.r)) {
      const nextKey = key(next.c, next.r);
      if (visited.has(nextKey)) continue;

      visited.add(nextKey);
      parent.set(nextKey, key(current.c, current.r));

      if (nextKey === targetKey) {
        const path = [{ c: targetC, r: targetR }];
        let walkKey = nextKey;

        while (walkKey !== startKey) {
          const prevKey = parent.get(walkKey);
          if (!prevKey) break;

          const [pc, pr] = prevKey.split(",").map(Number);
          path.push({ c: pc, r: pr });
          walkKey = prevKey;
        }

        return path.reverse();
      }

      queue.push(next);
    }
  }

  return null;
}

function getBestEyesPath(startC, startR) {
  const targets = getEyesReturnTargets();

  let bestPath = null;

  targets.forEach((target) => {
    const path = getShortestTilePath(startC, startR, target.c, target.r);

    if (!path) return;

    if (!bestPath || path.length < bestPath.length) {
      bestPath = path;
    }
  });

  return bestPath;
}

function startEyesReturnPath(g) {
  const path = getBestEyesPath(g.col, g.row);

  g.eyePath = path || [];
  g.eyePathIndex = 1;

  if (!path || path.length <= 1) {
    reviveGhostInCage(g);
    return;
  }

  const nextTile = path[g.eyePathIndex];
  setEyesDirectionToward(g, nextTile.c, nextTile.r);
}

function setEyesDirectionToward(g, targetC, targetR) {
  const diffX = targetC - g.visualX;
  const diffY = targetR - g.visualY;

  if (Math.abs(diffX) > Math.abs(diffY)) {
    g.direction = diffX > 0 ? "right" : "left";
  } else if (Math.abs(diffY) > 0) {
    g.direction = diffY > 0 ? "down" : "up";
  }
}

function updateEyesReturnMovement(g, dt) {
  if (!g.isEaten || g.mode !== "eyes") return false;

  if (!g.eyePath || g.eyePath.length === 0 || g.eyePathIndex >= g.eyePath.length) {
    startEyesReturnPath(g);
    return true;
  }

  const target = g.eyePath[g.eyePathIndex];

  if (!target) {
    reviveGhostInCage(g);
    return true;
  }

  setEyesDirectionToward(g, target.c, target.r);

  const speed = SPEED_CELLS_PER_SECOND * EATEN_GHOST_SPEED_MULTIPLIER;
  const diffX = target.c - g.visualX;
  const diffY = target.r - g.visualY;
  const distance = Math.hypot(diffX, diffY);

  if (distance <= 0.03) {
    g.visualX = target.c;
    g.visualY = target.r;
    g.col = target.c;
    g.row = target.r;

    if (g.eyePathIndex >= g.eyePath.length - 1) {
      reviveGhostInCage(g);
      return true;
    }

    g.eyePathIndex += 1;
    const nextTarget = g.eyePath[g.eyePathIndex];
    setEyesDirectionToward(g, nextTarget.c, nextTarget.r);
    return true;
  }

  const step = Math.min(distance, speed * dt);

  g.visualX += (diffX / distance) * step;
  g.visualY += (diffY / distance) * step;

  // Keep logical tile synced when the eyes are close to a tile center.
  const roundedC = Math.round(g.visualX);
  const roundedR = Math.round(g.visualY);

  if (isWalkableForGhost(roundedC, roundedR)) {
    g.col = roundedC;
    g.row = roundedR;
  }

  return true;
}


/* ==========================
   MOVEMENT ENGINE
========================== */
function updateEntity(ent, dt, isPlayer) {
  if (!isPlayer && ent.isEaten && ent.mode === "eyes") {
    updateEyesReturnMovement(ent, dt);
    return;
  }

  if (!isPlayer && !ent.isReleased) return;

  const speed = (!isPlayer && ent.isEaten)
    ? SPEED_CELLS_PER_SECOND * EATEN_GHOST_SPEED_MULTIPLIER
    : (!isPlayer && ent.isVulnerable)
      ? SPEED_CELLS_PER_SECOND * 0.60
      : SPEED_CELLS_PER_SECOND;

  if (ent.moving || (!isPlayer && ent.isVulnerable)) {
    ent.animTimer += dt * 15;
  }

  if (
    Math.abs(ent.visualX - ent.col) < 0.3 &&
    Math.abs(ent.visualY - ent.row) < 0.3
  ) {
    if (ent.nextDx !== 0 || ent.nextDy !== 0) {
      if ((isPlayer ? isWalkableForPlayer : isWalkableForGhost)(ent.col + ent.nextDx, ent.row + ent.nextDy)) {
        ent.visualX = ent.col;
        ent.visualY = ent.row;

        ent.dx = ent.nextDx;
        ent.dy = ent.nextDy;

        ent.nextDx = 0;
        ent.nextDy = 0;

        ent.moving = true;

        updateEntityDirection(ent, isPlayer);
      }
    }
  }

  if (ent.moving) {
    ent.visualX += ent.dx * speed * dt;
    ent.visualY += ent.dy * speed * dt;

    if (!(isPlayer ? isWalkableForPlayer : isWalkableForGhost)(ent.col + ent.dx, ent.row + ent.dy)) {
      if (
        (ent.dx === 1 && ent.visualX > ent.col) ||
        (ent.dx === -1 && ent.visualX < ent.col) ||
        (ent.dy === 1 && ent.visualY > ent.row) ||
        (ent.dy === -1 && ent.visualY < ent.row)
      ) {
        ent.visualX = ent.col;
        ent.visualY = ent.row;
        ent.moving = false;
      }
    }

    if (ent.dx > 0 && ent.visualX >= ent.col + 1) {
      ent.col++;
      ent.visualX = ent.col;
    } else if (ent.dx < 0 && ent.visualX <= ent.col - 1) {
      ent.col--;
      ent.visualX = ent.col;
    } else if (ent.dy > 0 && ent.visualY >= ent.row + 1) {
      ent.row++;
      ent.visualY = ent.row;
    } else if (ent.dy < 0 && ent.visualY <= ent.row - 1) {
      ent.row--;
      ent.visualY = ent.row;
    } else {
      return;
    }

    const tile = mapData[ent.row][ent.col];

    if (/[A-D]/.test(tile)) {
      teleport(ent, tile, ent.col, ent.row);
    } else if (isPlayer) {
      eatDotAt(ent.col, ent.row);
    }
  }
}


function startGameOverSequence() {
  if (gameOverActive) return;

  GameSound.playGameOver();

  endingStarted = false;
  gameOverActive = true;
  gameOverTimer = GAME_OVER_DURATION;
  gameOverLoopSeen = false;
  gameFrozen = true;
  readyFreezeTimer = 0;

  if (gameOverResetTimeout) {
    clearTimeout(gameOverResetTimeout);
    gameOverResetTimeout = null;
  }

  if (roomStatus) {
    roomStatus.textContent = "Game over.";
  }

  draw();

  // Fallback safety:
  // If the animation loop was interrupted when Game Over started,
  // this timeout forces a clean restart after 3 seconds.
  gameOverResetTimeout = setTimeout(() => {
    if (!gameOverActive) return;

    const needsLoopKick = !gameOverLoopSeen;

    gameOverResetTimeout = null;
    resetGame();
    showStartScreen();
    draw();

    if (needsLoopKick) {
      lastFrameTime = 0;
      requestAnimationFrame(update);
    }
  }, GAME_OVER_DURATION * 1000);
}

/* ==========================
   RESET
========================== */
function resetRound() {
  GameSound.stopBackgroundLoops();

  player.isDead = false;

  player.col = pacmanSpawn.c;
  player.row = pacmanSpawn.r;
  player.visualX = pacmanSpawn.c;
  player.visualY = pacmanSpawn.r;

  player.dx = 0;
  player.dy = 0;
  player.nextDx = 0;
  player.nextDy = 0;

  player.angle = 0;
  player.moving = false;
  player.animTimer = 0;
  player.currentFrame = 1;

  player.deathPhase = 0;
  player.pauseTimer = 0;
  player.deathTimer = 0;
  player.postDeathTimer = 0;

  respawnGhost(ghost, 1, 0, "right", true);
  respawnGhost(tealGhost, 0, -1, "up", true);
  respawnGhost(pinkGhost, 0, -1, "up", true);
  respawnGhost(orangeGhost, 0, -1, "up", true);

  resetGhostScoreCombo();
  startInitialReadyFreeze("Starting...");
}

function restartAfterGameOver() {
  resetGame();

  // After GAME OVER, show the READY page again before the new game starts.
  startReadyFreeze("Starting...");
}

function resetGame() {
  GameSound.stopBackgroundLoops();

  // Full state cleanup after ending / game over / debug reset.
  if (gameOverResetTimeout) {
    clearTimeout(gameOverResetTimeout);
    gameOverResetTimeout = null;
  }

  gameOverActive = false;
  gameOverTimer = 0;
  gameOverLoopSeen = false;
  gameFrozen = false;
  endingStarted = false;
  readyFreezeTimer = 0;

  blackoutOverlay.style.opacity = "0";

  score = 0;
  lives = 3;

  initDots();
  resetRound();

  updateHUD();
}

/* ==========================
   DRAW
========================== */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;

  let activeBackground = mapTexture;

  if (gameOverActive && gameOverMapTexture.complete && gameOverMapTexture.naturalWidth > 0) {
    activeBackground = gameOverMapTexture;
  } else if (screenState === "paused" && pauseMapTexture.complete && pauseMapTexture.naturalWidth > 0) {
    activeBackground = pauseMapTexture;
  } else if (screenState === "start" && continueMapTexture.complete && continueMapTexture.naturalWidth > 0) {
    activeBackground = continueMapTexture;
  } else if (readyFreezeTimer > 0 && readyMapTexture.complete && readyMapTexture.naturalWidth > 0) {
    activeBackground = readyMapTexture;
  }

  if (activeBackground.complete && activeBackground.naturalWidth > 0) {
    ctx.drawImage(
      activeBackground,
      0,
      0,
      canvas.width,
      TILE_SIZE * PLAYABLE_ROWS
    );
  }

  if (screenState === "start") {
    return;
  }


  for (const dot of dots) {
    if (!dot.active) continue;

    const x = dot.c * TILE_SIZE + TILE_SIZE / 2;
    const y = dot.r * TILE_SIZE + TILE_SIZE / 2;

    if (dot.isBig) {
      const flickerOn = gameOverActive || screenState === "paused" || Math.floor(performance.now() / (BIG_DOT_FLICKER_INTERVAL * 1000)) % 2 === 0;

      if (flickerOn && bigDotTexture.complete && bigDotTexture.naturalWidth > 0) {
        const size = TILE_SIZE * 0.7;
        ctx.drawImage(bigDotTexture, x - size / 2, y - size / 2, size, size);
      }
    } else {
      ctx.fillStyle = "#FFFF00";
      const size = TILE_SIZE * 0.2;
      ctx.fillRect(x - size / 2, y - size / 2, size, size);
    }
  }

  if (player.isDead) {
    if (player.deathPhase === 0) {
      drawPacman();

      if (!shouldHideGhostsDuringReady()) {
        drawGhost(ghost, ghostSprites);
        drawGhost(tealGhost, tealGhostSprites);
        drawGhost(pinkGhost, pinkGhostSprites);
        drawGhost(orangeGhost, orangeGhostSprites);
      }
    } else if (player.deathPhase === 1) {
      const frame = Math.floor(player.deathTimer);

      if (frame < deathSprites.length) {
        const dSprite = deathSprites[frame];

        if (dSprite.complete && dSprite.naturalWidth > 0) {
          drawSpriteCentered(dSprite, player.visualX, player.visualY, CHARACTER_SCALE);
        }
      }
    }
  } else {
    drawPacman();

    if (!shouldHideGhostsDuringReady()) {
      drawGhost(ghost, ghostSprites);
      drawGhost(tealGhost, tealGhostSprites);
      drawGhost(pinkGhost, pinkGhostSprites);
      drawGhost(orangeGhost, orangeGhostSprites);
    }
  }

  // Draw ghost point signs last so they stay above the map, dots, Pac-Man and ghosts.
  drawGhostPointPopups();
}

function drawGhostPointPopups() {
  if (ghostPointPopups.length === 0) return;

  ghostPointPopups.forEach((popup) => {
    const sprite = ghostPointSprites[popup.value];
    if (!sprite || !sprite.complete || sprite.naturalWidth <= 0) return;

    const progress = Math.min(popup.age / popup.duration, 1);

    // Still position: no falling movement.
    const y = popup.startY + GHOST_POINT_POPUP_OFFSET_Y;

    const width = TILE_SIZE * GHOST_POINT_POPUP_SCALE;
    const height = width * (sprite.naturalHeight / sprite.naturalWidth);
    const x = Math.round((popup.x + GHOST_POINT_POPUP_OFFSET_X) * TILE_SIZE + TILE_SIZE / 2 - width / 2);
    const drawY = Math.round(y * TILE_SIZE + TILE_SIZE / 2 - height / 2);

    // Chunky arcade-style fade:
    // It stays solid first, then disappears in visible steps instead of a smooth fade.
    let alpha = 1;
    if (progress >= 0.55) {
      const steppedFade = Math.floor(((progress - 0.55) / 0.45) * 6);
      const alphaSteps = [1, 0.85, 0.65, 0.45, 0.2, 0.08, 0];
      alpha = alphaSteps[Math.max(0, Math.min(steppedFade, alphaSteps.length - 1))];
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.drawImage(sprite, x, drawY, width, height);
    ctx.restore();
  });
}

function drawSpriteCentered(sprite, visualX, visualY, scale = CHARACTER_SCALE) {
  const size = TILE_SIZE * scale;
  const x = visualX * TILE_SIZE + TILE_SIZE / 2 - size / 2;
  const y = visualY * TILE_SIZE + TILE_SIZE / 2 - size / 2;

  ctx.drawImage(sprite, x, y, size, size);
}

function drawPacman() {
  const pSprite = pacmanSprites[player.currentFrame];

  if (pSprite && pSprite.complete && pSprite.naturalWidth > 0) {
    const size = TILE_SIZE * CHARACTER_SCALE;

    ctx.save();

    ctx.translate(
      player.visualX * TILE_SIZE + TILE_SIZE / 2,
      player.visualY * TILE_SIZE + TILE_SIZE / 2
    );

    ctx.rotate(player.angle);

    ctx.drawImage(
      pSprite,
      -size / 2,
      -size / 2,
      size,
      size
    );

    ctx.restore();
  }
}


function drawEatenGhostEyes(g) {
  const sprite = eatenGhostEyeSprites[g.direction] || eatenGhostEyeSprites.right;

  if (sprite && sprite.complete && sprite.naturalWidth > 0) {
    drawSpriteCentered(sprite, g.visualX, g.visualY, CHARACTER_SCALE);
  }
}

function drawGhost(g, spriteSet) {
  if (gameOverActive) return;
  if (g.isEaten) {
    const eyeSprite = eatenGhostSprites[g.direction] || eatenGhostSprites.up;

    if (eyeSprite && eyeSprite.complete && eyeSprite.naturalWidth > 0) {
      drawSpriteCentered(eyeSprite, g.visualX, g.visualY, CHARACTER_SCALE);
    }

    return;
  }

  if (g.isVulnerable) {
    const vulnerableElapsed = g.vulnerableDuration - g.vulnerableTimer;

    // First 6 seconds: loop only between VULNERABLE B and VULNERABLE D.
    // Last 2 seconds: loop through all vulnerable sprites before the effect disappears.
    const vulnerableSequence = vulnerableElapsed < 6
      ? [vulnerableSprites[1], vulnerableSprites[3]]
      : vulnerableSprites;

    const frameIndex = Math.floor(g.animTimer / 4) % vulnerableSequence.length;
    const sprite = vulnerableSequence[frameIndex];

    if (sprite && sprite.complete && sprite.naturalWidth > 0) {
      drawSpriteCentered(sprite, g.visualX, g.visualY, CHARACTER_SCALE);
    }

    return;
  }

  const gGroup = spriteSet[g.direction];

  if (gGroup && gGroup.length > 0) {
    const gFrame = Math.floor(g.animTimer) % gGroup.length;
    const gSprite = gGroup[gFrame];

    if (gSprite && gSprite.complete && gSprite.naturalWidth > 0) {
      drawSpriteCentered(gSprite, g.visualX, g.visualY, CHARACTER_SCALE);
    }
  }
}


// READY text overlay removed. The freeze now uses an alternate background image instead.
function drawReadyOverlay() {}

/* ==========================
   GAME LOOP
========================== */
let lastFrameTime = 0;

function update(time) {
  const dt = lastFrameTime === 0
    ? 0
    : Math.min((time - lastFrameTime) / 1000, 0.05);

  lastFrameTime = time;

  updateFloatingGhostScores(dt);
  GameSound.updateLoops();

  if (gameOverActive) {
    gameOverLoopSeen = true;
    gameOverTimer -= dt;

    if (gameOverTimer <= 0) {
      // After GAME OVER, reset and wait on the START / CONTINUE screen.
      resetGame();
      showStartScreen();
      lastFrameTime = 0;
      requestAnimationFrame(update);
      return;
    }

    draw();
    requestAnimationFrame(update);
    return;
  }

  if (screenState === "start" || screenState === "paused") {
    draw();
    requestAnimationFrame(update);
    return;
  }

  if (gameFrozen) {
    draw();
    requestAnimationFrame(update);
    return;
  }

  if (readyFreezeTimer > 0) {
    readyFreezeTimer -= dt;

    if (readyFreezeTimer < 0) {
      readyFreezeTimer = 0;
    }

    draw();
    requestAnimationFrame(update);
    return;
  }

  updateGhostScoreCombo(dt);
  updateGhostPointPopups(dt);

  if (!player.isDead) {
    allGhosts.forEach((g) => {
      updateGhostRelease(g, dt);
      updateGhostCageWaiting(g, dt);


      if (g.isVulnerable && !g.isEaten) {
        g.vulnerableTimer -= dt;

        if (g.vulnerableTimer <= 0) {
          g.isVulnerable = false;
          g.vulnerableTimer = 0;
        }
      }
    });

    updateEntity(player, dt, true);

    if (gameFrozen) {
      draw();
      requestAnimationFrame(update);
      return;
    }

    allGhosts.forEach((g) => updateGhostCageExit(g, dt));

    updateEatenGhostReturn(ghost);
    chooseRedGhostAIDirection();
    updateEntity(ghost, dt, false);

    updateEatenGhostReturn(orangeGhost);
    chooseOrangeGhostAIDirection();
    updateEntity(orangeGhost, dt, false);

    updateEatenGhostReturn(tealGhost);
    chooseTealGhostAIDirection();
    updateEntity(tealGhost, dt, false);

    updateEatenGhostReturn(pinkGhost);
    choosePinkGhostAIDirection();
    updateEntity(pinkGhost, dt, false);

    checkCollisions();

    if (player.moving) {
      const seq = [0, 1, 2, 1];
      player.currentFrame = seq[Math.floor(player.animTimer) % seq.length];
    } else {
      player.currentFrame = 1;
    }
  } else {
    if (player.deathPhase === 0) {
      player.pauseTimer += dt;

      if (player.pauseTimer >= 1.0) {
        player.deathPhase = 1;
      }
    } else if (player.deathPhase === 1) {
      player.deathTimer += dt * 10;

      if (Math.floor(player.deathTimer) >= deathSprites.length) {
        player.deathPhase = 2;
      }
    } else if (player.deathPhase === 2) {
      player.postDeathTimer += dt;

      if (player.postDeathTimer >= 1.0) {
        lives -= 1;

        if (lives > 0) {
          resetRound();
        } else {
          updateHUD();
          startGameOverSequence();
          requestAnimationFrame(update);
          return;
        }

        updateHUD();
      }
    }
  }

  draw();
  requestAnimationFrame(update);
}

/* ==========================
   START
========================== */
GameSound.init();
setupGameSoundUnlockers();
eatDotAt(player.col, player.row);
createDebugButtons();
updateHUD();
setupScreenWakeLock();

// First load auto-starts the game.
// After GAME OVER, the game still goes to the CONTINUE / START screen.
screenState = "playing";
gameFrozen = false;
GameSound.playStart();
startReadyFreeze("Starting...");
requestAnimationFrame(update);
  }
  </script>
