<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Pac-Man Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
      touch-action: none;
    }
    
    /* Top - Status */
    #topSection {
      width: 100%;
      text-align: center;
    }
    
    #status {
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
      height: 25px;
    }
    
    .status-ok {
      color: #00ff00;
      font-weight: bold;
    }
    
    .status-error {
      color: #ff0000;
      font-weight: bold;
    }
    
    #roomInfo {
      font-size: 14px;
      color: #aaa;
    }
    
    /* Middle - Gamepad */
    #gamepadSection {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .gamepad {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-gap: 12px;
      margin: 30px 0;
    }
    
    button {
      width: 90px;
      height: 90px;
      font-size: 32px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(145deg, #ffff00, #ffdd00);
      color: #000;
      transition: all 0.05s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      box-shadow: 0 6px 0 #cccc00;
      font-family: Arial, sans-serif;
      active: false;
    }
    
    button:active {
      transform: translateY(6px);
      box-shadow: 0 0 0 #cccc00;
      background: linear-gradient(145deg, #ffdd00, #ffff00);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #up { grid-column: 2; grid-row: 1; }
    #left { grid-column: 1; grid-row: 2; }
    #down { grid-column: 2; grid-row: 2; }
    #right { grid-column: 3; grid-row: 2; }
    
    /* Bottom - Score & Info */
    #bottomSection {
      width: 100%;
      text-align: center;
    }
    
    #scoreDisplay {
      font-size: 20px;
      font-weight: bold;
      color: #ffff00;
      margin-bottom: 10px;
      padding: 10px;
      background: rgba(255, 255, 0, 0.1);
      border: 2px solid #ffff00;
      border-radius: 8px;
    }
    
    #playerInfo {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
    }
    
    @media (max-height: 600px) {
      .gamepad {
        grid-template-columns: repeat(3, 70px);
        grid-gap: 8px;
      }
      
      button {
        width: 70px;
        height: 70px;
        font-size: 24px;
        box-shadow: 0 4px 0 #cccc00;
      }
      
      button:active {
        transform: translateY(4px);
      }
    }
  </style>
</head>
<body>
  <!-- TOP - Status & Room Info -->
  <div id="topSection">
    <div id="status">Connecting...</div>
    <div id="roomInfo">Loading...</div>
  </div>
  
  <!-- MIDDLE - Gamepad Controls -->
  <div id="gamepadSection">
    <h2 style="margin-bottom: 10px;">🎮 Game Controller</h2>
    <div class="gamepad">
      <button id="up" disabled>⬆️</button>
      <button id="left" disabled>⬅️</button>
      <button id="down" disabled>⬇️</button>
      <button id="right" disabled>➡️</button>
    </div>
  </div>
  
  <!-- BOTTOM - Score & Info -->
  <div id="bottomSection">
    <div id="scoreDisplay">Score: 0</div>
    <div id="playerInfo">
      Use the arrow buttons to control Pac-Man
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  
  <script>
    // ===== FIREBASE CONFIG (SAME AS MAIN PAGE) =====
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ===== CONTROLLER LOGIC =====
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const gameId = urlParams.get('gameId');
    const statusDiv = document.getElementById('status');
    const roomInfoDiv = document.getElementById('roomInfo');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const playerInfoDiv = document.getElementById('playerInfo');

    let playerConnected = false;
    let playerName = '';
    let lastActionTime = 0;

    // Check connection to game
    function checkConnection() {
      if (!roomCode || !gameId) {
        statusDiv.textContent = '❌ Invalid QR Code';
        statusDiv.className = 'status-error';
        roomInfoDiv.textContent = 'Please scan a valid QR code';
        disableButtons();
        return;
      }

      const gameRef = db.ref(`games/${gameId}`);
      
      gameRef.once('value', (snapshot) => {
        if (snapshot.exists()) {
          playerConnected = true;
          statusDiv.textContent = '✅ Connected!';
          statusDiv.className = 'status-ok';
          roomInfoDiv.textContent = `Room: ${roomCode}`;
          playerInfoDiv.textContent = 'Ready to play! Use arrows to control Pac-Man';
          enableButtons();
          registerPlayer();
          listenForGameUpdates();
        } else {
          statusDiv.textContent = '❌ Game not found';
          statusDiv.className = 'status-error';
          roomInfoDiv.textContent = 'The game session has ended';
          disableButtons();
        }
      });
    }

    // Register player in Firebase
    function registerPlayer() {
      playerName = `Player ${Math.floor(Math.random() * 10000)}`;
      const gameRef = db.ref(`games/${gameId}/players/${Date.now()}`);
      gameRef.set({
        name: playerName,
        joinedAt: Date.now()
      });
    }

    // Listen for game updates
    function listenForGameUpdates() {
      const gameRef = db.ref(`games/${gameId}/gameState`);
      
      gameRef.on('value', (snapshot) => {
        const gameData = snapshot.val();
        if (gameData && gameData.score !== undefined) {
          scoreDisplay.textContent = `Score: ${gameData.score}`;
        }
      });
    }

    // Send input to Firebase
    function sendInput(action) {
      if (!playerConnected || !gameId) return;

      const now = Date.now();
      // Throttle inputs to avoid spam (50ms delay)
      if (now - lastActionTime < 50) return;
      lastActionTime = now;

      const actionRef = db.ref(`games/${gameId}/actions/lastAction`);
      actionRef.set(action, (error) => {
        if (error) {
          console.error('Error sending input:', error);
          statusDiv.textContent = '⚠️ Connection lost';
          statusDiv.className = 'status-error';
          disableButtons();
        }
      });
    }

    // Enable gamepad buttons
    function enableButtons() {
      document.querySelectorAll('.gamepad button').forEach(btn => {
        btn.disabled = false;
      });
    }

    // Disable gamepad buttons
    function disableButtons() {
      document.querySelectorAll('.gamepad button').forEach(btn => {
        btn.disabled = true;
      });
    }

    // Setup button event listeners
    const buttons = ['up', 'down', 'left', 'right'];

    buttons.forEach(button => {
      const el = document.getElementById(button);
      
      // Touch events
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        el.style.background = 'linear-gradient(145deg, #ffdd00, #ffff00)';
        sendInput(button);
      });
      
      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });

      // Mouse events (for testing on desktop)
      el.addEventListener('mousedown', () => {
        el.style.background = 'linear-gradient(145deg, #ffdd00, #ffff00)';
        sendInput(button);
      });

      el.addEventListener('mouseup', () => {
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });

      el.addEventListener('mouseleave', () => {
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });
    });

    // Check connection on load
    window.addEventListener('load', () => {
      setTimeout(checkConnection, 500);
    });

    // Monitor Firebase connection
    db.ref('.info/connected').on('value', (snapshot) => {
      if (snapshot.val() === true) {
        if (!playerConnected) {
          checkConnection();
        }
      } else {
        statusDiv.textContent = '❌ No internet';
        statusDiv.className = 'status-error';
        playerConnected = false;
        disableButtons();
      }
    });

    // Reconnect if game is lost
    setInterval(() => {
      if (!playerConnected && roomCode && gameId) {
        checkConnection();
      }
    }, 5000);
  </script>
</body>
</html>
