<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GAMEPAD</title>

  <style>
    :root{
      --bg:#0b0b0f;
      --nes:#d9d9d9;
      --stroke: rgba(0,0,0,.25);
      --shadow: rgba(0,0,0,.35);
      --panelTop:#2c2c2c;
      --panelBot:#222;
      --whiteA: rgba(255,255,255,.08);
      --whiteB: rgba(255,255,255,.14);
      --red:#e11d2e;
      --red-dark:#b60f1d;
    }
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background: var(--bg);
      color:#fff;
      font-family: system-ui, Arial, sans-serif;
      overflow:hidden;
      overscroll-behavior:none;
      touch-action: manipulation;
    }

    /* Landscape hint */
    .rotate{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:#fff;
      font-size:20px;
      z-index:10;
      text-align:center;
      padding:20px;
    }
    @media (orientation: landscape){
      .rotate{ display:none; }
    }

    .app{
      width:100vw;
      height:100vh;
      padding: 14px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* “Console card” */
    .console{
      width: min(980px, 100%);
      height: 100%;
      max-height: 560px;
      background: linear-gradient(180deg, var(--nes) 0%, #d1d1d1 100%);
      border-radius: 18px;
      border: 2px solid var(--stroke);
      box-shadow: 0 18px 40px var(--shadow);
      position:relative;
      overflow:hidden;
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 14px;
      color:#111;
    }

    .console::before{
      content:"";
      position:absolute;
      left:0; right:0;
      top:14px;
      height: 14px;
      background: linear-gradient(90deg,
        #b61b2a 0 22%,
        #8e111e 22% 28%,
        #b61b2a 28% 34%,
        transparent 34% 100%);
      opacity:.65;
      pointer-events:none;
    }
    .grill{
      position:absolute;
      right: 18px;
      top: 18px;
      width: 110px;
      height: 10px;
      background: repeating-linear-gradient(
        90deg,
        rgba(0,0,0,.28) 0 6px,
        transparent 6px 10px
      );
      border-radius: 999px;
      opacity: .35;
      pointer-events:none;
    }

    .topbar{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      padding-top: 14px;
    }
    .title{
      font-weight: 1000;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 14px;
      opacity: .85;
    }

    .controls{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .controls input, .controls button{
      font-size:16px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.2);
      background: rgba(255,255,255,.6);
      color:#111;
      outline:none;
    }
    .controls input{ width: 190px; }
    .controls button{ cursor:pointer; font-weight:800; letter-spacing:.06em; }

    .status{
      font-size: 12px;
      opacity: .75;
      text-align:right;
      white-space:nowrap;
    }

    /* Big status panel (like screen UI) */
