<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NES Gamepad</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#111;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
}

/* rotate notice */
.rotate{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:10;
  font-size:20px;
}
@media (orientation: landscape){
  .rotate{display:none;}
}

/* layout */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* top bar */
.top{
  display:flex;
  gap:10px;
  padding:10px;
}
input,button{
  font-size:16px;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* controller area */
.pad{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:center;
  justify-items:center;
}

/* dpad */
.dpad{
  width:200px;
  height:200px;
  position:relative;
}
.dpad button{
  position:absolute;
  background:#333;
  color:#fff;
  border:none;
  font-size:22px;
  border-radius:10px;
}
.up{top:0;left:60px;width:80px;height:50px;}
.down{bottom:0;left:60px;width:80px;height:50px;}
.left{left:0;top:60px;width:50px;height:80px;}
.right{right:0;top:60px;width:50px;height:80px;}

/* start select */
.mid{
  display:flex;
  gap:20px;
}
.mid button{
  width:120px;
  height:40px;
  background:#555;
  color:#fff;
  border-radius:20px;
}

/* A B */
.ab{
  display:flex;
  gap:30px;
}
.ab button{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#e11d2e;
  color:#fff;
  font-size:26px;
  border:none;
}
</style>
</head>

<body>

<div class="rotate">Rotate phone to landscape</div>

<div class="app">

  <div class="top">
    <input id="room" placeholder="ROOM">
    <button id="join">JOIN</button>
  </div>

  <div class="pad">

    <div class="dpad">
      <button id="up" class="up">▲</button>
      <button id="down" class="down">▼</button>
      <button id="left" class="left">◀</button>
      <button id="right" class="right">▶</button>
    </div>

    <div class="mid">
      <button id="select">SELECT</button>
      <button id="start">START</button>
    </div>

      <butt
