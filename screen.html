<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCREEN (Input Monitor)</title>
  <style>
    html, body{
      margin:0;
      padding:0;
      font-family: system-ui, Arial, sans-serif;
      background:#0b0b0f;
      color:#fff;
    }
    .wrap{
      max-width: 900px;
      margin: 24px auto;
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 14px;
    }
    .top{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    input, button{
      font-size:16px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color:#fff;
      outline:none;
    }
    button{ cursor:pointer; }

    .big{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .big h1{
      margin:0;
      font-size: 18px;
      opacity:.85;
      font-weight: 700;
    }
    .action{
      font-size: 42px;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .time{
      opacity:.65;
      font-size: 13px;
    }

    /* Mini NES visual */
    .nes{
      width: 100%;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      padding: 16px;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      align-items:center;
    }
    .panel{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 160px;
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.08);
      position:relative;
    }

    /* Dpad */
    .dpad{
      width: 140px;
      height: 140px;
      position:relative;
    }
    .btn{
      position:absolute;
      display:grid;
      place-items:center;
      user-select:none;
      width: 52px;
      height: 44px;
      border-radius: 10px;
      background: #333;
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 900;
      color:#fff;
      opacity:.55;
      transition: transform .05s, opacity .05s, box-shadow .05s;
    }
    .btn.active{
      opacity: 1;
      transform: translateY(1px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,.35);
    }
    .up{ top:0; left:44px; }
    .down{ bottom:0; left:44px; }
    .left{ left:0; top:48px; width:44px; height:52px; }
    .right{ right:0; top:48px; width:44px; height:52px; }
    .center{
      position:absolute;
      inset: 44px;
      border-radius: 12px;
      background:#222;
      opacity:.6;
      border:1px solid rgba(255,255,255,.08);
    }

    /* Start/Select */
    .mid{
      display:flex;
      gap: 14px;
      align-items:center;
      justify-content:center;
    }
    .pill{
      width: 120px;
      height: 38px;
      border-radius: 999px;
      background:#444;
      border: 1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      font-weight: 900;
      letter-spacing:.08em;
      opacity:.55;
      transition: opacity .05s, transform .05s;
    }
    .pill.active{
      opacity: 1;
      transform: translateY(1px);
    }

    /* A/B */
    .ab{
      display:flex;
      gap: 18px;
      align-items:center;
      justify-content:center;
      transform: rotate(-12deg);
    }
    .round{
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background:#e11d2e;
      border: 2px solid rgba(0,0,0,.25);
      display:grid;
      place-items:center;
      font-size: 22px;
      font-weight: 900;
      opacity:.55;
      transition: opacity .05s, transform .05s, box-shadow .05s;
    }
    .round.active{
      opacity:1;
      transform: translateY(2px);
      box-shadow: 0 14px 22px rgba(0,0,0,.35);
    }

    .log{
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      opacity:.85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <input id="room" placeholder="ROOM (ABCD)" />
      <button id="startListen">Start</button>
      <span id="status" class="time">Waiting…</span>
    </div>

    <div class="big">
      <div>
        <h1>Last input</h1>
        <div id="bigAction" class="action">—</div>
        <div id="bigTime" class="time">—</div>
      </div>
      <div class="time" style="text-align:right">
        Tip: phone + screen must use the SAME room code.
      </div>
    </div>

    <div class="nes">
      <div class="panel">
        <div class="dpad">
          <div id="v_up" class="btn up">▲</div>
          <div id="v_down" class="btn down">▼</div>
          <div id="v_left" class="btn left">◀</div>
          <div id="v_right" class="btn right">▶</div>
          <div class="center"></div>
        </div>
      </div>

      <div class="panel">
        <div class="mid">
          <div id="v_select" class="pill">SELECT</div>
          <div id="v_start" class="pill">START</div>
        </div>
      </div>

      <div class="panel">
        <div class="ab">
          <div id="v_b" class="round">B</div>
          <div id="v_a" class="round">A</div>
        </div>
      </div>
    </div>

    <div id="raw" class="log">{}</div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let unsubRef = null;

    const statusEl = document.getElementById("status");
    const bigActionEl = document.getElementById("bigAction");
    const bigTimeEl = document.getElementById("bigTime");
    const rawEl = document.getElementById("raw");

    const allIds = ["up","down","left","right","a","b","start","select"];
    function clearActive(){
      allIds.forEach(k=>{
        const el = document.getElementById("v_" + k);
        el.classList.remove("active");
      });
    }

    function prettyAction(a){
      if(!a) return "—";
      const map = {
        up:"UP", down:"DOWN", left:"LEFT", right:"RIGHT",
        a:"A", b:"B", start:"START", select:"SELECT",
        connected:"CONNECTED"
      };
      return map[a] || String(a).toUpperCase();
    }

    document.getElementById("startListen").onclick = () => {
      const room = (document.getElementById("room").value.trim() || "ABCD").toUpperCase();

      // detach old listener
      if(unsubRef) unsubRef.off();

      statusEl.textContent = "Listening: " + room;

      unsubRef = db.ref("rooms/" + room + "/input");
      unsubRef.on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        // show raw
        rawEl.textContent = JSON.stringify(data, null, 2);

        // show big action
        const action = data.action;
        bigActionEl.textContent = prettyAction(action);

        const t = data.t ? new Date(data.t) : new Date();
        bigTimeEl.textContent = "Time: " + t.toLocaleString();

        // highlight
        clearActive();
        if(allIds.includes(action)){
          document.getElementById("v_" + action).classList.add("active");
          // remove highlight after a short time (so you can see taps)
          setTimeout(clearActive, 180);
        }
      });
    };
  </script>
</body>
</html>
