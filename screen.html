<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Screen Receiver (Firebase)</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background: radial-gradient(1200px 700px at 50% 0%, #14162a 0%, #0b0c14 45%, #05060b 100%);
    color:#fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 18px;
  }

  .wrap{
    width:min(1000px, 95vw);
    display:flex;
    flex-direction:column;
    gap: 14px;
  }

  .top{
    display:flex;
    gap: 12px;
    align-items:center;
    justify-content:space-between;
    padding: 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.10);
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    box-shadow: 0 18px 44px rgba(0,0,0,.6);
  }

  .top .left{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  .pill{
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.35);
    font-weight: 700;
    letter-spacing: .4px;
  }

  input{
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.35);
    color:#fff;
    outline:none;
    font-size: 16px;
    width: 180px;
    text-transform: uppercase;
  }

  button{
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.10);
    color:#fff;
    font-weight: 900;
    cursor:pointer;
  }
  button:active{ transform: scale(.98); }

  .ok{ color:#00ff88; }
  .bad{ color:#ff4d4d; }

  .card{
    padding: 22px;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,.10);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: 0 18px 44px rgba(0,0,0,.6);
    min-height: 320px;
    display:flex;
    flex-direction:column;
    gap: 16px;
    justify-content:center;
    align-items:center;
    text-align:center;
  }

  .big{
    font-size: clamp(44px, 9vw, 92px);
    font-weight: 1000;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sub{
    opacity:.8;
    font-size: 16px;
    line-height:1.4;
  }

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: min(720px, 100%);
    margin-top: 10px;
  }
  .mini{
    padding: 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.20);
    text-align:left;
    font-size: 14px;
  }
  .mini b{ opacity:.85; }
</style>
</head>

<body>
<div class="wrap">

  <div class="top">
    <div class="left">
      <span class="pill">SCREEN</span>
      <span class="pill">ROOM:</span>
      <span class="pill" id="roomShown">ABCD</span>
      <span class="pill" id="conn">connecting…</span>
    </div>

    <div class="right">
      <input id="roomInput" placeholder="ROOM" value="ABCD" />
      <button id="setRoom">SET</button>
    </div>
  </div>

  <div class="card">
    <div class="big" id="lastAction">—</div>
    <div class="sub" id="timeInfo">Waiting for input…</div>

    <div class="grid">
      <div class="mini"><b>Firebase path:</b><br><span id="pathShown">rooms/ABCD/input</span></div>
      <div class="mini"><b>Tip:</b><br>Open your controller as <code>controller.html?room=ABCD</code></div>
    </div>
  </div>

</div>

<!-- Firebase (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
    authDomain: "pacman-86c4e.firebaseapp.com",
    databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
    projectId: "pacman-86c4e",
    storageBucket: "pacman-86c4e.firebasestorage.app",
    messagingSenderId: "1044337774275",
    appId: "1:1044337774275:web:362fcd603a473c04e95c76"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const lastActionEl = document.getElementById("lastAction");
  const timeInfoEl = document.getElementById("timeInfo");
  const connEl = document.getElementById("conn");
  const roomShownEl = document.getElementById("roomShown");
  const pathShownEl = document.getElementById("pathShown");
  const roomInput = document.getElementById("roomInput");

  let unsub = null;
  let currentRoom = "ABCD";
  let lastT = 0;

  function prettyTime(ts){
    const d = new Date(ts);
    return d.toLocaleTimeString();
  }

  function listenRoom(room){
    currentRoom = room;

    roomShownEl.textContent = room;
    const path = `rooms/${room}/input`;
    pathShownEl.textContent = path;

    if (unsub) unsub.off();

    unsub = db.ref(path);
    lastActionEl.textContent = "—";
    timeInfoEl.textContent = "Waiting for input…";
    lastT = 0;

    unsub.on("value", snap => {
      const v = snap.val();
      if (!v || !v.action) return;

      // ignore repeats
      if (v.t && v.t === lastT) return;
      lastT = v.t || Date.now();

      lastActionEl.textContent = v.action;
      timeInfoEl.textContent = `Last update: ${prettyTime(lastT)} (t=${lastT})`;
    });
  }

  // connection status
  db.ref(".info/connected").on("value", snap => {
    if (snap.val() === true){
      connEl.textContent = "connected";
      connEl.className = "pill ok";
    } else {
      connEl.textContent = "offline";
      connEl.className = "pill bad";
    }
  });

  document.getElementById("setRoom").onclick = () => {
    const r = (roomInput.value || "ABCD").trim().toUpperCase();
    listenRoom(r);
  };

  // auto room from URL (?room=ABCD)
  const params = new URLSearchParams(location.search);
  const urlRoom = params.get("room");
  if (urlRoom) roomInput.value = urlRoom.toUpperCase();

  listenRoom((roomInput.value || "ABCD").trim().toUpperCase());
</script>
</body>
</html>
